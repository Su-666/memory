name: 构建并发布安装包

on:
  push:
    branches: [main]       # 推送到 main 分支时自动触发
  workflow_dispatch:        # 也支持手动触发

permissions:
  contents: write           # 允许创建/更新 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 10   # 获取最近 10 次提交，用于生成更新说明

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: 构建安装包
        env:
          SKIP_BUMP: '1'    # 云端构建跳过版本号递增，使用本地推送的 VERSION
        run: python build_exe.py

      - name: 获取提交信息
        id: info
        shell: bash
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          # 生成最近 5 条提交记录作为更新说明
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" -5 >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: 暖暖记忆助手 v${{ steps.info.outputs.version }}
          body: |
            ## 暖暖记忆助手 v${{ steps.info.outputs.version }}

            **自动构建** — ${{ steps.info.outputs.date }}
            **提交** — ${{ steps.info.outputs.sha }} ${{ steps.info.outputs.msg }}

            ### 更新说明
            ${{ steps.info.outputs.changelog }}

            ### 安装方式
            1. 下载 `暖暖记忆助手-Setup.exe`
            2. 双击运行，按向导完成安装
            3. 桌面快捷方式启动程序
            4. 首次启动在设置页面填入智谱 API Key 即可使用

            ### 获取 API Key
            - 智谱 AI：https://open.bigmodel.cn/
          files: |
            installer_output/暖暖记忆助手-Setup.exe
          draft: false
          prerelease: false
          make_latest: true
