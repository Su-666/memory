<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>暖暖 - 记忆助手</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d5e58;
            --bg-gradient-start: #f8fafb;
            --bg-gradient-end: #e8f4f0;
            --card-bg: #ffffff;
            --card-border: #d1e7e4;
            --text-primary: #1a2e2c;
            --text-secondary: #4a6360;
            --text-muted: #7a8f8c;
            --assistant-bg: #f0f7f6;
            --assistant-border: #c5ddd9;
            --user-bg: linear-gradient(135deg, #0f766e, #14b8a6);
            --border-radius: 17px;
            --shadow: 0 2px 12px rgba(15, 118, 110, 0.08);
            --shadow-hover: 0 4px 20px rgba(15, 118, 110, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
        }

        .header {
            background: linear-gradient(135deg, #e0f2ee 0%, #d5ebe7 50%, #c8e6e0 100%);
            border-bottom: 1px solid var(--card-border);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .header-badge {
            background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
            color: #8b6914;
            border: 1px solid #e8d4a8;
            border-radius: 13px;
            padding: 5px 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            width: fit-content;
            box-shadow: 0 1px 3px rgba(139, 105, 20, 0.1);
        }

        .header-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .theme-toggle {
            background: linear-gradient(135deg, #f8fafb 0%, #e8f4f0 100%);
            border: 1px solid #d1e7e4;
            border-radius: 17px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.1);
        }

        body.dark-mode {
            --bg-gradient-start: #1a2e2c;
            --bg-gradient-end: #0f766e;
            --card-bg: #2a4a47;
            --card-border: #4a6360;
            --text-primary: #f0f7f6;
            --text-secondary: #c5ddd9;
            --text-muted: #7a8f8c;
            --assistant-bg: #1a2e2c;
            --assistant-border: #4a6360;
            --user-bg: linear-gradient(135deg, #0f766e, #14b8a6);
        }

        .stats-badge {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
            border: 1px solid #f59e0b;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .stats-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #fff8f0 0%, #fff5eb 100%);
            border: 1px solid #e8d4b8;
            border-radius: 17px;
            padding: 10px 18px;
            color: #6b5a3d;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, #fffcf5 0%, #fffaef 100%);
            border-color: #d4b888;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-clear:hover {
            color: #b54a35;
            border-color: #e8c4b8;
            background: linear-gradient(135deg, #fff5f0 0%, #fff0eb 100%);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            min-height: 500px;
        }

        .chat-view {
            flex: 1;
            min-height: 0;
            max-height: calc(100vh - 340px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #c5ddd9 transparent;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, #fafcfb 0%, #f5f9f8 100%);
        }

        .chat-view::-webkit-scrollbar {
            width: 6px;
        }

        .chat-view::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-view::-webkit-scrollbar-thumb {
            background: #c5ddd9;
            border-radius: 3px;
        }

        .chat-view::-webkit-scrollbar-thumb:hover {
            background: #a8c8c2;
        }

        .bubble {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: var(--border-radius);
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 16px;
            animation: bubbleIn 0.25s ease-out;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--user-bg);
            border: none;
            color: #ffffff;
            box-shadow: 0 3px 12px rgba(15, 118, 110, 0.25);
        }

        .bubble-assistant {
            align-self: flex-start;
            background: var(--assistant-bg);
            border: 1px solid var(--assistant-border);
            color: var(--text-primary);
        }

        .bubble-assistant .bubble-name {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .bubble-results {
            align-self: flex-start;
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f2fe 100%);
            border: 1px solid #c5d8ed;
            border-radius: var(--border-radius);
            padding: 16px;
            max-width: 92%;
            animation: bubbleIn 0.3s ease-out;
        }

        .results-title {
            font-size: 12px;
            font-weight: 700;
            color: #7a5a20;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .results-title::before {
            content: "📋";
        }

        .result-item {
            background: #ffffff;
            border: 1px solid #d5e0ed;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .result-item:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, #f5fffe 0%, #eefffc 100%);
            box-shadow: var(--shadow-hover);
            transform: translateX(4px);
        }

        .result-item.selected {
            border-color: var(--primary) !important;
            background: linear-gradient(135deg, #e8fff8 0%, #d5f8ef 100%) !important;
            box-shadow: 0 4px 16px rgba(15, 118, 110, 0.2) !important;
            transform: translateX(4px);
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.45;
            margin-bottom: 6px;
        }

        .result-time {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-image {
            max-width: 280px;
            max-height: 180px;
            border-radius: 10px;
            margin-top: 10px;
            object-fit: cover;
            border: 1px solid #d5e0ed;
            transition: transform 0.2s ease;
        }

        .result-image:hover {
            transform: scale(1.02);
        }

        .result-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn-small {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-small:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: linear-gradient(180deg, #f8fcfb 0%, #f4f9f8 100%);
            border-top: 1px solid var(--card-border);
        }

        .command-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #d8e8e4;
            border-radius: var(--border-radius);
            font-size: 16px;
            outline: none;
            background: #ffffff;
            color: var(--text-primary);
            transition: all 0.25s ease;
            /* 防止iOS输入时缩放页面 */
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
        }

        .command-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .command-input::placeholder {
            color: #a8b8b4;
        }

        .btn-send {
            width: 54px;
            height: 54px;
            border-radius: 27px;
            background: var(--user-bg);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(15, 118, 110, 0.3);
        }

        .btn-send:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
        }

        .btn-send:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-voice {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #e0f7f4 0%, #d5f0ec 100%);
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-voice:hover {
            background: linear-gradient(135deg, #c8f0ea 0%, #b8e8e0 100%);
            transform: scale(1.05);
        }

        .btn-voice.recording {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            border-color: #ff4444;
            color: white;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4);
            }
            50% { 
                transform: scale(1.08);
                box-shadow: 0 0 0 12px rgba(255, 82, 82, 0);
            }
        }

        .status-bar {
            margin-top: 12px;
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--card-bg) 0%, #f8fcfb 100%);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading-dots {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: loadingBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingBounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        .welcome {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-secondary);
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome h2 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .welcome p {
            margin-bottom: 10px;
            font-size: 15px;
        }

        .welcome .tips {
            margin-top: 28px;
            text-align: left;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .welcome .tip-item {
            background: linear-gradient(135deg, #f5f9f8 0%, #f0f5f3 100%);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .welcome .tip-item:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, #f0faf8 0%, #e8f5f2 100%);
            transform: translateX(4px);
        }

        #audio-indicator {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.95) 0%, rgba(20, 184, 166, 0.95) 100%);
            color: white;
            padding: 36px 56px;
            border-radius: var(--border-radius);
            font-size: 20px;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 10px 40px rgba(15, 118, 110, 0.35);
            backdrop-filter: blur(10px);
        }

        #audio-indicator .mic-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            animation: micPulse 1s ease-in-out infinite;
        }

        @keyframes micPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #audio-indicator .sub {
            font-size: 13px;
            margin-top: 12px;
            opacity: 0.85;
        }

        /* 连续对话模式样式 */
        .btn-voice.recording {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-voice.recording:hover {
            background: linear-gradient(135deg, #ff3838 0%, #ff2828 100%);
            transform: translateY(-2px);
        }

        .pending-indicator {
            background: linear-gradient(135deg, #fff8e6 0%, #fff3d6 100%);
            border: 1px solid #e8c88a;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            color: #8b6914;
            margin-left: auto;
            animation: fadeInOut 0.3s ease;
        }

        @keyframes fadeInOut {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .drop-active {
            border-color: var(--primary) !important;
            background: linear-gradient(135deg, #e8fff8 0%, #d8fff4 100%) !important;
        }

        /* 图片预览模态框 */
        .image-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .image-modal-overlay.active {
            display: flex;
        }

        .image-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        .image-modal-content.zoomed {
            transform: scale(2);
            cursor: zoom-out;
            position: absolute;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .image-modal-close {
            position: fixed;
            top: 20px;
            right: 24px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 2001;
            transition: background 0.2s;
        }

        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .image-modal-info {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 2001;
        }

        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                gap: 12px;
                padding: 14px 16px;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: linear-gradient(135deg, #e0f2ee 0%, #d5ebe7 50%, #c8e6e0 100%);
            }
            .header-left {
                align-items: center;
                text-align: center;
            }
            .header-badge {
                font-size: 9px;
                padding: 4px 10px;
            }
            .header-title {
                font-size: 24px;
            }
            .header-subtitle {
                font-size: 11px;
            }
            .header-right {
                width: 100%;
                justify-content: center;
                gap: 8px;
            }
            .stats-badge {
                font-size: 10px;
                padding: 3px 8px;
            }
            .theme-toggle {
                padding: 6px 10px;
                font-size: 12px;
            }
            .main {
                padding: 0;
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
                height: 100dvh;
            }
            .chat-container {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
                border-radius: 0;
                border: none;
                margin-top: 90px;
            }
            .chat-view {
                flex: 1;
                min-height: 0;
                max-height: none;
                padding: 14px 12px;
                padding-bottom: 120px;
            }
            .bubble {
                max-width: 90%;
                padding: 12px 14px;
                font-size: 15px;
            }
            .bubble-assistant .bubble-name {
                font-size: 11px;
            }
            .input-area {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                gap: 8px;
                padding: 10px 12px;
                z-index: 99;
                background: rgba(248, 252, 251, 0.95);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-top: 1px solid var(--card-border);
            }
            .command-input {
                padding: 12px 14px;
                font-size: 16px;
                min-height: 48px;
                max-height: 120px;
                overflow-y: auto;
            }
            .btn-send {
                width: 48px;
                height: 48px;
                border-radius: 24px;
                font-size: 18px;
                flex-shrink: 0;
            }
            .btn-voice {
                width: 44px;
                height: 44px;
                font-size: 18px;
                flex-shrink: 0;
            }
            .status-bar {
                display: none;
            }
            .welcome {
                padding: 20px 16px;
            }
            .welcome-icon {
                font-size: 44px;
            }
            .welcome h2 {
                font-size: 20px;
            }
            .welcome p {
                font-size: 13px;
            }
            .welcome .tips {
                max-width: 100%;
            }
            .welcome .tip-item {
                padding: 10px 12px;
                font-size: 12px;
            }
            .result-item {
                padding: 12px;
            }
            .result-title {
                font-size: 13px;
            }
            .result-summary {
                font-size: 12px;
            }
            .result-image {
                max-width: 100%;
                max-height: 150px;
            }
            .result-actions {
                flex-wrap: wrap;
            }
            .btn-small {
                padding: 5px 10px;
                font-size: 11px;
            }
            .file-pending-area {
                margin: 0 10px 10px 10px;
            }
            #audio-indicator {
                padding: 28px 40px;
                font-size: 18px;
            }
            #audio-indicator .mic-icon {
                font-size: 40px;
            }

            /* 聊天区域底部留出输入框空间 */
            .chat-view {
                scroll-padding-bottom: 20px;
            }

            /* 输入法弹出时保持页面布局 */
            .chat-container {
                contain: layout style;
            }
        }

        /* 安全区域适配 - iPhone刘海屏 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            @media (max-width: 700px) {
                .input-area {
                    padding-bottom: calc(10px + env(safe-area-inset-bottom));
                }
                .main {
                    padding-bottom: env(safe-area-inset-bottom);
                }
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-badge">LOCAL MEMORY STUDIO</div>
            <div class="header-title">暖暖</div>
            <div class="header-subtitle">把零散念头、语音和附件整理成可搜索的私人记忆库</div>
        </div>

    <div class="main">
        <div class="chat-container">
            <div class="chat-view" id="chat-view">
                <div class="welcome">
                    <div class="welcome-icon">🌸</div>
                    <h2>你好！我是暖暖</h2>
                    <p>你可以直接告诉我想记住什么，或像聊天一样问我"之前存过什么"。</p>
                    <p>支持语音输入、拖拽文件和图片。</p>
                    <div class="tips">
                        <div class="tip-item">💬 试试说：「帮我记住我的手机号是138xxxx」</div>
                        <div class="tip-item">🔍 试试问：「我之前记过什么？」</div>
                        <div class="tip-item">🎤 点击麦克风按钮可以语音输入</div>
                        <div class="tip-item">📁 拖拽文件到输入框可以上传保存</div>
                    </div>
                </div>
            </div>

            <div class="input-area" id="drop-area">
                <textarea class="command-input" id="command-input" placeholder="输入内容...（回车发送）" onkeypress="handleKeyPress(event)" rows="1" style="resize: none; overflow: hidden;"></textarea>
                <button class="btn-voice" id="voice-btn" title="语音输入" onclick="toggleVoice()">🎤</button>
                <button class="btn-send" id="send-btn" title="发送" onclick="sendMessage()">➜</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div id="status">准备就绪</div>
        <div class="loading-dots" id="loading" style="display: none;">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div id="pending-indicator" class="pending-indicator" style="display: none;">
            等待补充内容...
        </div>
    </div>

    <div id="audio-indicator">
        <div class="mic-icon">🎤</div>
        <div>正在监听...</div>
        <div class="sub">检测到语音自动开始录音</div>
    </div>

    <!-- 图片预览模态框 (默认隐藏) -->
    <div id="image-modal" class="image-modal-overlay">
        <button class="image-modal-close" id="modal-close-btn">✕</button>
        <img id="modal-image" class="image-modal-content" alt="图片预览" 
             onclick="toggleImageZoom(event)" 
             style="display:none;"
             onerror="handleImageError(this)">
        <div id="modal-error" style="display:none; color:#fff; text-align:center; padding:40px;">
            <div style="font-size:48px; margin-bottom:16px;">😢</div>
            <div style="font-size:18px; margin-bottom:12px;">无法加载图片</div>
            <div style="font-size:12px; color:#aaa; word-break:break-all; max-width:80%; margin-top:10px;" id="modal-error-path"></div>
            <div style="margin-top:24px;">
                <button id="modal-close-btn-2"
                        style="background:var(--primary);color:white;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;">
                    关闭
                </button>
            </div>
        </div>
        <div id="modal-info" class="image-modal-info"></div>
    </div>

    <!-- 统计信息弹窗 -->
    <div id="stats-modal" class="image-modal-overlay" style="display: none;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            <h3 style="margin: 0 0 20px 0; color: #1a2e2c; font-size: 24px;">📊 记忆统计</h3>
            <div id="stats-content">
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 48px; margin-bottom: 10px;">⏳</div>
                    <div>加载中...</div>
                </div>
            </div>
            <div style="text-align: right; margin-top: 20px;">
                <button onclick="closeStatsModal()" style="background: #f0f7f6; border: 1px solid #c5ddd9; border-radius: 10px; padding: 8px 16px; cursor: pointer;">关闭</button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let isRecording = false;
        let voiceReplyEnabled = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let pendingSaveText = null;
        const sendBtn = document.getElementById('send-btn');
        
        // 实时语音对话相关变量
        let isContinuousMode = false; // 是否处于连续对话模式
        let vadAnalyzer = null; // 语音活动检测器
        let silenceTimer = null; // 静音检测定时器
        let audioContext = null; // Web Audio API上下文
        let analyser = null; // 音频分析器
        let microphone = null; // 麦克风流
        let vadBuffer = []; // VAD缓冲区
        let vadThreshold = 0.01; // 语音活动阈值
        let silenceDuration = 1500; // 静音持续时间(ms)
        let isListening = false; // 是否正在监听

        // 输入框自动调整高度
        function autoResizeTextarea() {
            const textarea = document.getElementById('command-input');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // 监听输入框输入事件
        document.getElementById('command-input').addEventListener('input', autoResizeTextarea);

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function setLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
            sendBtn.disabled = show;
        }

        function showPendingIndicator(show) {
            document.getElementById('pending-indicator').style.display = show ? 'block' : 'none';
            const input = document.getElementById('command-input');
            if (show) {
                input.placeholder = '请输入要记住的内容（如：138xxxx）...';
                input.style.borderColor = '#e8c88a';
            } else {
                input.placeholder = '输入内容...（回车发送）';
                input.style.borderColor = '';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('command-input');
            const text = input.value.trim();
            if (!text && !pendingSaveText) return;

            if (pendingSaveText) {
                const decision = text.toLowerCase().trim();
                
                // 确认保存
                if (['记住', '保存', '要', '好', '好的', '是', '嗯', 'ok'].includes(decision)) {
                    addBubble('user', text);
                    input.value = '';
                    setLoading(true);
                    setStatus('正在保存...');
                    
                    try {
                        const response = await fetch('/api/chat/confirm_save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: text, pending_text: pendingSaveText })
                        });
                        const data = await response.json();
                        if (data.text) {
                            addBubble('assistant', data.text);
                        }
                        pendingSaveText = null;
                        showPendingIndicator(false);
                    } catch (e) {
                        addBubble('assistant', '保存失败: ' + e.message);
                    }
                    
                    setLoading(false);
                    setStatus('准备就绪');
                    return;
                }
                
                // 取消保存
                if (['不用', '不', '不要', '取消', '算了'].includes(decision)) {
                    addBubble('user', text);
                    input.value = '';
                    addBubble('assistant', '好的，不保存。');
                    pendingSaveText = null;
                    showPendingIndicator(false);
                    setLoading(false);
                    setStatus('准备就绪');
                    return;
                }
                
                // 输入了具体内容 - 合并保存（修复：数字/具体内容会合并到待保存文本中）
                addBubble('user', text);
                input.value = '';
                setLoading(true);
                setStatus('正在保存...');
                
                try {
                    const fullText = pendingSaveText + ' ' + text;
                    const response = await fetch('/api/chat/confirm_save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, pending_text: fullText })
                    });
                    const data = await response.json();
                    if (data.text) {
                        addBubble('assistant', data.text);
                    }
                    pendingSaveText = null;
                    showPendingIndicator(false);
                } catch (e) {
                    addBubble('assistant', '保存失败: ' + e.message);
                }
                
                setLoading(false);
                setStatus('准备就绪');
                return;
            }

            addBubble('user', text);
            input.value = '';
            setLoading(true);
            setStatus('正在处理...');
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                if (data.error) {
                    addBubble('assistant', '出错了: ' + data.error);
                    setLoading(false);
                    setStatus('出错了');
                    return;
                }

                if (data.pending_save) {
                    pendingSaveText = data.pending_save;
                    showPendingIndicator(true);
                }

                addBubble('assistant', data.text);

                        if (data.results && data.results.length > 0) {
                    showResults(data.results);
                }

                if (data.text && voiceReplyEnabled) {
                    speakText(data.text);
                }
                voiceReplyEnabled = false;

            } catch (e) {
                addBubble('assistant', '请求失败: ' + e.message);
                setStatus('网络错误');
            }

            setLoading(false);
            setStatus('准备就绪');
        }

        function scrollToBottom() {
            const view = document.getElementById('chat-view');
            view.scrollTop = view.scrollHeight;
        }

        function addBubble(type, text) {
            const view = document.getElementById('chat-view');
            
            const welcome = view.querySelector('.welcome');
            if (welcome) {
                welcome.remove();
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble bubble-' + type;
            
            if (type === 'assistant') {
                bubble.innerHTML = '<span class="bubble-name">暖暖</span>' + escapeHtml(text).replace(/\n/g, '<br>');
            } else {
                bubble.textContent = text;
            }
            
            view.appendChild(bubble);
            setTimeout(scrollToBottom, 50);
        }

        function showResults(results) {
            const view = document.getElementById('chat-view');
            const container = document.createElement('div');
            container.className = 'bubble-results';

            const title = document.createElement('div');
            title.className = 'results-title';
            title.textContent = '相关记忆';
            container.appendChild(title);

            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                // 点击卡片 - 不再自动搜索，让用户选择操作
                div.addEventListener('click', function(e) {
                    // 如果点击的是按钮或其子元素，忽略
                    if (e.target.closest('.btn-small') || e.target.tagName === 'IMG') return;
                    
                    // 高亮当前选中的卡片
                    document.querySelectorAll('.result-item.selected').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    
                    // 提示用户使用按钮操作
                    setStatus('💡 请使用「📋 复制记忆」或「🖼️ 查看大图」按钮');
                    setTimeout(() => setStatus('准备就绪'), 2000);
                });
                
                let html = `<div class="result-title">${escapeHtml(item.title || '无标题')}</div>`;
                if (item.summary) {
                    html += `<div class="result-summary">${escapeHtml(item.summary)}</div>`;
                }
                if (item.time) {
                    html += `<div class="result-time">${escapeHtml(item.time)}</div>`;
                }
                
                const filePath = (item.file_path || '').trim();
                
                // 显示图片预览（如果有图片）
                const isImageFile = filePath && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(filePath);
                if (isImageFile) {
                    // 生成唯一的图片ID用于后续引用
                    const imgId = 'mem-img-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
                    html += `<img class="result-image" id="${imgId}" src="/api/file/image?path=${encodeURIComponent(filePath)}" alt="预览" loading="lazy" data-full-src="/api/file/image?path=${encodeURIComponent(filePath)}">`;
                }
                
                // 准备要复制的文本内容
                let copyContent = '';
                if (item.body && item.body !== item.title) {
                    copyContent = escapeHtml(item.body);
                } else if (item.summary) {
                    copyContent = escapeHtml(item.summary);
                } else if (item.title) {
                    copyContent = escapeHtml(item.title);
                }
                
                html += `<div class="result-actions">`;
                html += `<button class="btn-small" onclick="copyMemory(event, ${JSON.stringify(item).replace(/"/g, '&quot;')})">📋 复制记忆</button>`;
                if (isImageFile) {
                    // 直接使用当前卡片的图片元素来放大
                    html += `<button class="btn-small" onclick="zoomImage(this)">🖼️ 查看大图</button>`;
                }
                html += `</div>`;
                
                div.innerHTML = html;
                container.appendChild(div);
            });

            view.appendChild(container);
            setTimeout(scrollToBottom, 50);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 直接用图片URL显示大图（最可靠的方式）
        function zoomImage(btnElement) {
            if (btnElement) {
                if (typeof btnElement.stopPropagation === 'function') {
                    btnElement.stopPropagation();
                }
                if (btnElement.preventDefault) btnElement.preventDefault();
            }
            
            const card = btnElement ? btnElement.closest('.result-item') : null;
            if (!card) return;
            
            const imgEl = card.querySelector('.result-image');
            if (!imgEl) return;
            
            const title = card.querySelector('.result-title') ? card.querySelector('.result-title').textContent : '';
            
            if (imgEl.src && imgEl.src.length > 10) {
                showImageFromSrc(imgEl.src, title);
            } else {
                // 图片还没加载完成，等一下再试
                imgEl.onload = function() {
                    showImageFromSrc(this.src, title);
                };
                setStatus('加载中...');
            }
        }

        // 用已验证的URL显示大图
        function showImageFromSrc(imageSrc, title) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-image');
            const info = document.getElementById('modal-info');
            const errorDiv = document.getElementById('modal-error');

            img.style.display = 'block';
            errorDiv.style.display = 'none';
            img.className = 'image-modal-content';
            
            // 直接复用能显示的图片地址（加时间戳避免缓存）
            img.src = imageSrc + '&_full=1&t=' + Date.now();
            
            info.textContent = title ? (title + ' | 点击放大/缩小 | ESC 关闭') : '点击放大/缩小 | ESC 关闭';
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            
            const img = document.getElementById('modal-image');
            img.src = ''; // 清空src停止加载
            img.style.display = 'none';
            document.getElementById('modal-error').style.display = 'none';
        }

        // 统计信息相关函数
        async function showStats() {
            const modal = document.getElementById('stats-modal');
            const content = document.getElementById('stats-content');
            
            content.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 48px; margin-bottom: 10px;">⏳</div>
                    <div>加载中...</div>

            modal.style.display = 'block';
            
            try {

                            <div style="color: var(--text-secondary); font-size: 13px;">总记忆数</div>
                        </div>

                            <div style="font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 4px;">${stats.recent_count || 0}</div>
                            <div style="color: var(--text-secondary); font-size: 13px;">最近记忆</div>
                        </div>

                            <div style="font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 4px;">${stats.total_files || 0}</div>
                            <div style="color: var(--text-secondary); font-size: 13px;">文件数量</div>
                        </div>
                    </div>
                    
                    ${stats.top_tags && stats.top_tags.length > 0 ? `
                        <div style="margin-bottom: 20px;">

                            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                ${stats.top_tags.slice(0, 10).map(([tag, count]) => 
                                    `<span style="background: var(--primary-light); color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;">${tag} (${count})</span>`
                                ).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    ${stats.storage_info ? `
                        <div style="margin-bottom: 20px;">
                            <h4 style="margin: 0 0 12px 0; color: var(--text-primary); font-size: 16px; font-weight: 600;">存储信息</h4>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                <div style="background: var(--bg-secondary); padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                                    <div style="font-size: 18px; font-weight: bold; color: var(--primary);">${stats.storage_info.total_size || '0MB'}</div>
                                    <div style="color: var(--text-secondary); font-size: 12px;">总大小</div>
                                </div>
                                <div style="background: var(--bg-secondary); padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                                    <div style="font-size: 18px; font-weight: bold; color: var(--primary);">${stats.storage_info.last_backup || '无'}</div>
                                    <div style="color: var(--text-secondary); font-size: 12px;">最后备份</div>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${stats.last_updated ? `
                        <div style="color: var(--text-secondary); font-size: 12px; text-align: center; padding-top: 16px; border-top: 1px solid var(--border);">
                            📅 最后更新: ${new Date(stats.last_updated).toLocaleString('zh-CN')}
                        </div>
                    ` : ''}
                `;
                
            } catch (error) {
                content.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #dc2626;">
                        <div style="font-size: 48px; margin-bottom: 10px;">❌</div>

                    </div>
                `;
            }
        }

        function closeStatsModal() {
            document.getElementById('stats-modal').style.display = 'none';
        }

        // 语音活动检测 (VAD) - 检测用户何时开始和停止说话
        async function initVAD() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.3;
                
                microphone = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                
                const source = audioContext.createMediaStreamSource(microphone);
                source.connect(analyser);
                
                vadBuffer = [];
                return true;
            } catch (error) {
                console.error('VAD初始化失败:', error);
                return false;
            }
        }

        function checkVoiceActivity() {
            if (!analyser) return false;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            // 计算音频能量
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i] * dataArray[i];
            }
            const rms = Math.sqrt(sum / bufferLength) / 128.0; // 归一化到0-1
            
            // 滑动平均滤波
            vadBuffer.push(rms);
            if (vadBuffer.length > 10) {
                vadBuffer.shift();
            }
            
            const avgEnergy = vadBuffer.reduce((a, b) => a + b, 0) / vadBuffer.length;
            return avgEnergy > vadThreshold;
        }

        // 开始连续语音对话
        async function startContinuousConversation() {
            if (isContinuousMode) return;
            
            try {
                setStatus('🎤 初始化语音识别...');
                
                // 初始化VAD
                const vadReady = await initVAD();
                if (!vadReady) {
                    throw new Error('无法访问麦克风');
                }
                
                isContinuousMode = true;
                isListening = true;
                updateVoiceButton();
                
                setStatus('👂 正在监听，请说话...');
                document.getElementById('audio-indicator').style.display = 'block';
                document.getElementById('audio-indicator').innerHTML = `
                    <div class="mic-icon">🎤</div>
                    <div>正在监听...</div>
                    <div class="sub">检测到语音自动开始录音</div>
                `;
                
                // 开始语音活动检测循环
                vadLoop();
                
            } catch (error) {
                console.error('连续对话启动失败:', error);
                setStatus('语音功能不可用: ' + error.message);
                stopContinuousConversation();
            }
        }

        // VAD检测循环
        function vadLoop() {
            if (!isContinuousMode) return;
            
            const hasVoice = checkVoiceActivity();
            
            if (hasVoice && !isRecording) {
                // 检测到语音，开始录音
                startRecordingFromVAD();
            } else if (!hasVoice && isRecording) {
                // 语音停止，延迟检查是否真的静音
                if (!silenceTimer) {
                    silenceTimer = setTimeout(() => {
                        if (!checkVoiceActivity()) {
                            stopRecordingAndProcess();
                        }
                        silenceTimer = null;
                    }, silenceDuration);
                }
            }
            
            // 继续检测循环
            if (isContinuousMode) {
                requestAnimationFrame(vadLoop);
            }
        }

        // 从VAD开始录音
        function startRecordingFromVAD() {
            if (isRecording) return;
            
            try {
                mediaRecorder = new MediaRecorder(microphone, { 
                    mimeType: 'audio/webm;codecs=opus' 
                });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        await processVoiceInput();
                    }
                };
                
                mediaRecorder.start(100); // 每100ms收集一次数据
                isRecording = true;
                
                setStatus('🎙️ 正在录音...');
                document.getElementById('audio-indicator').innerHTML = `
                    <div class="mic-icon">🎙️</div>
                    <div>正在录音...</div>
                    <div class="sub">请继续说话，停顿时自动处理</div>
                `;
                
                // 清除静音定时器
                if (silenceTimer) {
                    clearTimeout(silenceTimer);
                    silenceTimer = null;
                }
                
            } catch (error) {
                console.error('录音启动失败:', error);
                setStatus('录音失败: ' + error.message);
            }
        }

        // 停止录音并处理

        // 处理语音输入
        async function processVoiceInput() {
            try {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const wavBlob = await convertWebMToWAV(audioBlob);
                
                setStatus('🎯 正在识别语音...');
                const text = await recognizeAudioForConversation(wavBlob);
                
                if (text && text.trim()) {
                    // 自动发送识别到的文本

                    document.getElementById('command-input').value = text;
                    await sendMessage();
                    
                    setStatus('✅ 识别完成，等待回复...');
                } else {
                    setStatus('❓ 未识别到有效内容');
                    addBubble('assistant', '我没有听清，请再试一次...');
                }
                
                // 短暂延迟后重新开始监听
                setTimeout(() => {

                setStatus('❌ 语音处理失败: ' + error.message);
                addBubble('assistant', '语音处理失败，请重试');

        // 将 WebM 转换为 WAV 格式（百度ASR需要WAV）
        async function convertWebMToWAV(webmBlob) {
            const arrayBuffer = await webmBlob.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

            // 获取PCM数据
            const wavData = audioBufferToWav(audioContext, audioBuffer);
            audioContext.close();
            return new Blob([wavData], { type: 'audio/wav' });
        }

        // 将 AudioBuffer 转换为 WAV 格式
        function audioBufferToWav(audioContext, audioBuffer) {
            const numChannels = 1; // 单声道
            const sampleRate = audioBuffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;

            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            const numFrames = audioBuffer.length;
            const dataSize = numFrames * blockAlign;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            // 写入PCM数据（转换为16位有符号整数）
            const channelData = audioBuffer.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < numFrames; i++) {
                const sample = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }

            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        async function convertAndRecognize(webmBlob) {

                await recognizeAudio(webmBlob);

        async function recognizeAudio(audioBlob) {
            try {
                const formData = new FormData();
                // 百度ASR需要WAV格式
                const fileName = audioBlob.type === 'audio/wav' ? 'recording.wav' : 'recording.webm';
                formData.append('audio', audioBlob, fileName);

                const response = await fetch('/api/speech_recognize', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.error) {
                    setStatus('识别失败: ' + data.error);
                    addBubble('assistant', '语音识别失败: ' + data.error);
                    return;
                }

                const text = data.text;
                if (text) {
                    voiceReplyEnabled = true;
                    document.getElementById('command-input').value = text;
                    sendMessage();
                } else {
                    voiceReplyEnabled = false;
                    setStatus('未识别到文字');
                    addBubble('assistant', '我没有听清，请再说一次...');
                }

            } catch (e) {
                voiceReplyEnabled = false;
                setStatus('识别失败: ' + e.message);
                addBubble('assistant', '语音识别失败: ' + e.message);
            }
        }

        async function speakText(text) {
            try {
                const cleanText = text.replace(/\n/g, ' ').replace(/（[^）]+）/g, '').trim();
                if (!cleanText) return;
                
                const response = await fetch('/api/speech_synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: cleanText })
                });

                const data = await response.json();
                if (data.error) return;

                const audioB64 = data.audio;
                const audioBytes = Uint8Array.from(atob(audioB64), c => c.charCodeAt(0));
                const audioBlob = new Blob([audioBytes], { type: 'audio/wav' });
                
                // 先停止正在播放的音频
                const currentAudio = window._currentAudio;
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.src = '';
                    URL.revokeObjectURL(currentAudio._blobUrl);
                }
                
                // 创建新音频并播放
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio._blobUrl = audioUrl;  // 保存引用以便清理
                window._currentAudio = audio;   // 全局引用
                
                audio.play();
                // 播放完成后释放内存
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    if (window._currentAudio === audio) {
                        window._currentAudio = null;
                    }
                };

            } catch (e) {
            }
        }

        function clearPendingFiles() {
            pendingFiles = [];
            updatePendingUI();
            setStatus('准备就绪');
        }

        function addFilesToPending(files) {
            for (const file of files) {
                pendingFiles.push(file);
            }
            updatePendingUI();
            
            if (pendingFiles.length > 0) {
                setStatus(`已选择 ${pendingFiles.length} 个文件，请点击「确认上传」`);
            }
        }

        async function confirmUploadFiles() {
            if (pendingFiles.length === 0) return;
            
            setLoading(true);
            setStatus('正在上传...');

            const caption = document.getElementById('file-caption').value.trim();

            const formData = new FormData();
            for (let i = 0; i < pendingFiles.length; i++) {
                formData.append('files', pendingFiles[i]);
            }
            if (caption) {
                formData.append('caption', caption);
            }

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                // 清空暂存
                clearPendingFiles();
                document.getElementById('file-caption').value = '';
                
                if (data.success) {
                    addBubble('user', `[上传${caption ? ': ' + caption : ''}] ${pendingFiles.length}个文件`);
                    addBubble('assistant', data.message || '文件已保存到记忆库。');
                } else {
                    addBubble('assistant', '上传失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                addBubble('assistant', '上传失败: ' + e.message);
            }

            setLoading(false);
            setStatus('准备就绪');
        }

        const dropArea = document.getElementById('drop-area');
        
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('drop-active');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('drop-active');
        });

        dropArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropArea.classList.remove('drop-active');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                // 暂存文件而不是直接上传
                addFilesToPending(files);
            }
        });

        // 聊天区域也支持拖拽
        const chatView = document.getElementById('chat-view');
        
        chatView.addEventListener('dragover', (e) => {
            e.preventDefault();
            chatView.style.background = 'rgba(15, 118, 110, 0.05)';
        });

        chatView.addEventListener('dragleave', () => {
            chatView.style.background = '';
        });

        chatView.addEventListener('drop', async (e) => {
            e.preventDefault();
            chatView.style.background = '';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                addFilesToPending(files);
            }
        });
        
        // 初始化主题
        initTheme();
        
        // 性能监控
        window.performanceData = {
            apiCalls: 0,
            totalResponseTime: 0,
            errors: 0
        };
        
        // 拦截fetch请求进行性能监控
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const startTime = performance.now();
            window.performanceData.apiCalls++;
            
            try {
                const response = await originalFetch.apply(this, args);
                const duration = performance.now() - startTime;
                window.performanceData.totalResponseTime += duration;
                
                if (!response.ok) {
                    window.performanceData.errors++;
                }
                
                return response;
            } catch (error) {
                window.performanceData.errors++;
                throw error;
            }
        };
    </script>
</body>
</html>
