<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>暖暖 - 记忆助手</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d5e58;
            --bg-gradient-start: #f8fafb;
            --bg-gradient-end: #e8f4f0;
            --card-bg: #ffffff;
            --card-border: #d1e7e4;
            --text-primary: #1a2e2c;
            --text-secondary: #4a6360;
            --text-muted: #7a8f8c;
            --assistant-bg: #f0f7f6;
            --assistant-border: #c5ddd9;
            --user-bg: linear-gradient(135deg, #0f766e, #14b8a6);
            --border-radius: 17px;
            --shadow: 0 2px 12px rgba(15, 118, 110, 0.08);
            --shadow-hover: 0 4px 20px rgba(15, 118, 110, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            min-height: 100dvh;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #e0f2ee 0%, #d5ebe7 50%, #c8e6e0 100%);
            border-bottom: 1px solid var(--card-border);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .header-badge {
            background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
            color: #8b6914;
            border: 1px solid #e8d4a8;
            border-radius: 13px;
            padding: 5px 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            width: fit-content;
            box-shadow: 0 1px 3px rgba(139, 105, 20, 0.1);
        }

        .header-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .theme-toggle {
            background: linear-gradient(135deg, #f8fafb 0%, #e8f4f0 100%);
            border: 1px solid #d1e7e4;
            border-radius: 17px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.1);
        }

        body.dark-mode {
            --bg-gradient-start: #1a2e2c;
            --bg-gradient-end: #0d5e58;
            --card-bg: #2a4a47;
            --card-border: #4a6360;
            --text-primary: #f0f7f6;
            --text-secondary: #c5ddd9;
            --text-muted: #8a9f9c;
            --assistant-bg: #1a2e2c;
            --assistant-border: #4a6360;
            --user-bg: linear-gradient(135deg, #0f766e, #14b8a6);
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #2a4a47 0%, #1a2e2c 50%, #0f5e58 100%);
        }

        body.dark-mode .input-area {
            background: rgba(26, 46, 44, 0.97);
        }

        body.dark-mode .chat-view {
            background: linear-gradient(180deg, #1a2e2c 0%, #2a4a47 100%);
        }

        body.dark-mode .voice-mode-bar {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            border-top-color: #10b981;
            color: #6ee7b7;
        }

        body.dark-mode .typing-indicator {
            background: #2a4a47;
            border-color: #4a6360;
        }

        body.dark-mode .welcome {
            color: var(--text-secondary);
        }

        body.dark-mode .welcome .tip-item {
            background: linear-gradient(135deg, #2a4a47 0%, #1a2e2c 100%);
            border-color: var(--card-border);
        }

        body.dark-mode .bubble-results {
            background: linear-gradient(135deg, #2a4a47 0%, #1a2e2c 100%);
            border-color: #4a6360;
        }

        body.dark-mode .result-item {
            background: #1a2e2c;
            border-color: #4a6360;
        }

        body.dark-mode .result-item:hover {
            background: linear-gradient(135deg, #2a4a47 0%, #1a2e2c 100%);
        }

        .stats-badge {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
            border: 1px solid #f59e0b;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .stats-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #fff8f0 0%, #fff5eb 100%);
            border: 1px solid #e8d4b8;
            border-radius: 17px;
            padding: 10px 18px;
            color: #6b5a3d;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, #fffcf5 0%, #fffaef 100%);
            border-color: #d4b888;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-clear:hover {
            color: #b54a35;
            border-color: #e8c4b8;
            background: linear-gradient(135deg, #fff5f0 0%, #fff0eb 100%);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            min-height: 0;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            min-height: 0;
        }

        .chat-view {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #c5ddd9 transparent;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, #fafcfb 0%, #f5f9f8 100%);
        }

        .chat-view::-webkit-scrollbar {
            width: 6px;
        }

        .chat-view::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-view::-webkit-scrollbar-thumb {
            background: #c5ddd9;
            border-radius: 3px;
        }

        .chat-view::-webkit-scrollbar-thumb:hover {
            background: #a8c8c2;
        }

        .bubble {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: var(--border-radius);
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 16px;
            animation: bubbleIn 0.25s ease-out;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--user-bg);
            border: none;
            color: #ffffff;
            box-shadow: 0 3px 12px rgba(15, 118, 110, 0.25);
        }

        .bubble-assistant {
            align-self: flex-start;
            background: var(--assistant-bg);
            border: 1px solid var(--assistant-border);
            color: var(--text-primary);
        }

        .bubble-assistant .bubble-name {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .bubble-results {
            align-self: flex-start;
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f2fe 100%);
            border: 1px solid #c5d8ed;
            border-radius: var(--border-radius);
            padding: 16px;
            max-width: 92%;
            animation: bubbleIn 0.3s ease-out;
        }

        .results-title {
            font-size: 12px;
            font-weight: 700;
            color: #7a5a20;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .results-title::before {
            content: "📋";
        }

        .result-item {
            background: #ffffff;
            border: 1px solid #d5e0ed;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .result-item:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, #f5fffe 0%, #eefffc 100%);
            box-shadow: var(--shadow-hover);
            transform: translateX(4px);
        }

        .result-item.selected {
            border-color: var(--primary) !important;
            background: linear-gradient(135deg, #e8fff8 0%, #d5f8ef 100%) !important;
            box-shadow: 0 4px 16px rgba(15, 118, 110, 0.2) !important;
            transform: translateX(4px);
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.45;
            margin-bottom: 6px;
        }

        .result-time {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-image {
            max-width: 280px;
            max-height: 180px;
            border-radius: 10px;
            margin-top: 10px;
            object-fit: cover;
            border: 1px solid #d5e0ed;
            transition: transform 0.2s ease;
        }

        .result-image:hover {
            transform: scale(1.02);
        }

        .result-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn-small {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-small:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: linear-gradient(180deg, #f8fcfb 0%, #f4f9f8 100%);
            border-top: 1px solid var(--card-border);
        }

        .command-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #d8e8e4;
            border-radius: var(--border-radius);
            font-size: 16px;
            outline: none;
            background: #ffffff;
            color: var(--text-primary);
            transition: all 0.25s ease;
            /* 防止iOS输入时缩放页面 */
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
        }

        .command-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .command-input::placeholder {
            color: #a8b8b4;
        }

        .btn-send {
            width: 54px;
            height: 54px;
            border-radius: 27px;
            background: var(--user-bg);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(15, 118, 110, 0.3);
        }

        .btn-send:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
        }

        .btn-send:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-voice {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #e0f7f4 0%, #d5f0ec 100%);
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-voice:hover {
            background: linear-gradient(135deg, #c8f0ea 0%, #b8e8e0 100%);
            transform: scale(1.05);
        }

        .btn-voice.recording {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            border-color: #ff4444;
            color: white;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4);
            }
            50% { 
                transform: scale(1.08);
                box-shadow: 0 0 0 12px rgba(255, 82, 82, 0);
            }
        }

        .status-bar {
            margin-top: 12px;
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--card-bg) 0%, #f8fcfb 100%);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading-dots {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: loadingBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingBounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        /* 打字指示器 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 14px 18px;
            background: var(--assistant-bg);
            border: 1px solid var(--assistant-border);
            border-radius: var(--border-radius);
            align-self: flex-start;
            animation: bubbleIn 0.25s ease-out;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingDot 1.4s ease-in-out infinite;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .welcome {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-secondary);
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome h2 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .welcome p {
            margin-bottom: 10px;
            font-size: 15px;
        }

        .welcome .tips {
            margin-top: 28px;
            text-align: left;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .welcome .tip-item {
            background: linear-gradient(135deg, #f5f9f8 0%, #f0f5f3 100%);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .welcome .tip-item:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, #f0faf8 0%, #e8f5f2 100%);
            transform: translateX(4px);
        }

        #audio-indicator {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.95) 0%, rgba(20, 184, 166, 0.95) 100%);
            color: white;
            padding: 36px 56px;
            border-radius: var(--border-radius);
            font-size: 20px;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 10px 40px rgba(15, 118, 110, 0.35);
            backdrop-filter: blur(10px);
        }

        #audio-indicator .mic-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            animation: micPulse 1s ease-in-out infinite;
        }

        @keyframes micPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #audio-indicator .sub {
            font-size: 13px;
            margin-top: 12px;
            opacity: 0.85;
        }

        /* 语音模式指示条 */
        .voice-mode-bar {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 4px 12px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-top: 1px solid #6ee7b7;
            font-size: 12px;
            color: #065f46;
            font-weight: 600;
        }
        .voice-mode-bar.active {
            display: flex;
        }
        .voice-mode-bar .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulseDot 1.5s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* 连续对话模式样式 */
        .btn-voice.recording {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-voice.recording:hover {
            background: linear-gradient(135deg, #ff3838 0%, #ff2828 100%);
            transform: translateY(-2px);
        }

        .pending-indicator {
            background: linear-gradient(135deg, #fff8e6 0%, #fff3d6 100%);
            border: 1px solid #e8c88a;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            color: #8b6914;
            margin-left: auto;
            animation: fadeInOut 0.3s ease;
        }

        @keyframes fadeInOut {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .drop-active {
            border-color: var(--primary) !important;
            background: linear-gradient(135deg, #e8fff8 0%, #d8fff4 100%) !important;
        }

        /* 图片预览模态框 */
        .image-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .image-modal-overlay.active {
            display: flex;
        }

        .image-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        .image-modal-content.zoomed {
            transform: scale(2);
            cursor: zoom-out;
            position: absolute;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .image-modal-close {
            position: fixed;
            top: 20px;
            right: 24px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 2001;
            transition: background 0.2s;
        }

        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .image-modal-info {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 2001;
        }

        /* ====== 超小屏手机 (≤360px) 如 iPhone SE ====== */
        @media (max-width: 360px) {
            .header {
                padding: 6px 8px;
                gap: 4px;
            }
            .header-title {
                font-size: 17px;
            }
            .header-badge {
                font-size: 7px;
                padding: 1px 5px;
            }
            .stats-badge {
                font-size: 9px;
                padding: 2px 5px;
            }
            .btn {
                padding: 5px 8px;
                font-size: 10px;
            }
            .bubble {
                max-width: 92%;
                padding: 8px 12px;
                font-size: 14px;
            }
            .welcome h2 {
                font-size: 18px;
            }
            .welcome .tip-item {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn-send, .btn-voice {
                width: 40px;
                height: 40px;
                min-width: 40px;
                font-size: 16px;
            }
            .command-input {
                font-size: 16px;
                min-height: 40px;
            }
            .voice-mode-bar {
                font-size: 10px;
                padding: 2px 6px;
            }
        }

        /* ====== 手机端适配 (≤700px) ====== */
        @media (max-width: 700px) {

        /* 安全区域适配 - iPhone刘海屏 */

<body>
    <div class="header">
        <div class="header-left">
            <div class="header-badge">LOCAL MEMORY STUDIO</div>
            <div class="header-title">暖暖</div>
            <div class="header-subtitle">你的贴心记忆小助手，记啥问我都行~</div>
        </div>
        <div class="header-right">
            <div class="stats-badge" onclick="showStats()" title="查看统计信息">📊 统计</div>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
            <button class="btn btn-clear" onclick="clearChat()">清空对话</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-container">
            <div class="chat-view" id="chat-view">
                <div class="welcome">
                    <div class="welcome-icon">🌸</div>
                    <h2>嗨，我是暖暖~</h2>
                    <p>告诉我你想记住什么，或者问我"之前记过啥"</p>
                    <p>点击🎤可以语音聊天哦</p>
                    <div class="tips">
                        <div class="tip-item">💬 说：「帮我记住手机号138xxxx」</div>
                        <div class="tip-item">🔍 问：「我之前记过什么？」</div>
                        <div class="tip-item">🎤 点麦克风开始语音聊天</div>
                        <div class="tip-item">📁 拖文件到输入框可以上传</div>
                    </div>
                </div>
            </div>

            <div class="voice-mode-bar" id="voice-mode-bar">
                <div class="pulse-dot"></div>
                <span>语音对话模式 · 自动朗读 · 点击🎤关闭</span>
            </div>
            <div class="input-area" id="drop-area">
                <textarea class="command-input" id="command-input" placeholder="跟我说说~（回车发送）" onkeypress="handleKeyPress(event)" rows="1" style="resize: none; overflow: hidden;"></textarea>
                <button class="btn-voice" id="voice-btn" title="点击开始语音对话" onclick="toggleVoice()" ontouchstart="voiceLongPressStart(event)" ontouchend="voiceLongPressEnd(event)" onmousedown="voiceLongPressStart(event)" onmouseup="voiceLongPressEnd(event)">🎤</button>
                <button class="btn-send" id="send-btn" title="发送" onclick="sendMessage()">➜</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div id="status">准备就绪</div>
        <div class="loading-dots" id="loading" style="display: none;">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div id="pending-indicator" class="pending-indicator" style="display: none;">
            等待补充内容...
        </div>
    </div>

    <div id="audio-indicator">
        <div class="mic-icon">🎤</div>
        <div>正在监听...</div>
        <div class="sub">检测到语音自动开始录音</div>
    </div>

    <!-- 图片预览模态框 (默认隐藏) -->
    <div id="image-modal" class="image-modal-overlay">
        <button class="image-modal-close" id="modal-close-btn">✕</button>
        <img id="modal-image" class="image-modal-content" alt="图片预览" 
             onclick="toggleImageZoom(event)" 
             style="display:none;"
             onerror="handleImageError(this)">
        <div id="modal-error" style="display:none; color:#fff; text-align:center; padding:40px;">
            <div style="font-size:48px; margin-bottom:16px;">😢</div>
            <div style="font-size:18px; margin-bottom:12px;">无法加载图片</div>
            <div style="font-size:12px; color:#aaa; word-break:break-all; max-width:80%; margin-top:10px;" id="modal-error-path"></div>
            <div style="margin-top:24px;">
                <button id="modal-close-btn-2"
                        style="background:var(--primary);color:white;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;">
                    关闭
                </button>
            </div>
        </div>
        <div id="modal-info" class="image-modal-info"></div>
    </div>

    <!-- 统计信息弹窗 -->
    <div id="stats-modal" class="image-modal-overlay" style="display: none;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            <h3 style="margin: 0 0 20px 0; color: #1a2e2c; font-size: 24px;">📊 记忆统计</h3>
            <div id="stats-content">
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 48px; margin-bottom: 10px;">⏳</div>
                    <div>加载中...</div>
                </div>
            </div>
            <div style="text-align: right; margin-top: 20px;">
                <button onclick="closeStatsModal()" style="background: #f0f7f6; border: 1px solid #c5ddd9; border-radius: 10px; padding: 8px 16px; cursor: pointer;">关闭</button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let isRecording = false;
        let voiceReplyEnabled = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let pendingSaveText = null;
        const sendBtn = document.getElementById('send-btn');

        // 语音对话相关变量
        let isVoiceMode = false; // 语音对话模式（自动朗读回复+连续对话）
        let mediaRecorderSupported = false;
        let selectedMimeType = '';

        // 输入框自动调整高度
        function autoResizeTextarea() {
            const textarea = document.getElementById('command-input');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // 监听输入框输入事件
        document.getElementById('command-input').addEventListener('input', autoResizeTextarea);

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function setLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
            sendBtn.disabled = show;
        }

        function showPendingIndicator(show) {
            document.getElementById('pending-indicator').style.display = show ? 'block' : 'none';
            const input = document.getElementById('command-input');
            if (show) {
                input.placeholder = '告诉我具体内容~（如：138xxxx）';
                input.style.borderColor = '#e8c88a';
            } else {
                input.placeholder = '跟我说说~（回车发送）';
                input.style.borderColor = '';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('command-input');
            const text = input.value.trim();
            if (!text && !pendingSaveText) return;

            if (pendingSaveText) {
                const decision = text.toLowerCase().trim();
                
                // 确认保存
                if (['记住', '保存', '要', '好', '好的', '是', '嗯', 'ok', '对', '没错', '行', '可以', '好呀', '好嘞'].includes(decision)) {
                    addBubble('user', text);
                    input.value = '';
                    setLoading(true);
                    setStatus('正在保存...');
                    
                    try {
                        const response = await fetch('/api/chat/confirm_save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: text, pending_text: pendingSaveText })
                        });
                        const data = await response.json();
                        if (data.text) {
                            addBubble('assistant', data.text);
                        }
                        pendingSaveText = null;
                        showPendingIndicator(false);
                    } catch (e) {
                        addBubble('assistant', '保存出了点问题: ' + e.message);
                    }
                    
                    setLoading(false);
                    setStatus('准备就绪');
                    return;
                }
                
                // 取消保存
                if (['不用', '不', '不要', '取消', '算了', '算了算了', '别', '不用了', '不记了'].includes(decision)) {
                    addBubble('user', text);
                    input.value = '';
                    addBubble('assistant', '好哒，那就不记啦~');
                    pendingSaveText = null;
                    showPendingIndicator(false);
                    setLoading(false);
                    setStatus('准备就绪');
                    return;
                }
                
                // 输入了具体内容 - 合并保存（修复：数字/具体内容会合并到待保存文本中）
                addBubble('user', text);
                input.value = '';
                setLoading(true);
                setStatus('正在保存...');
                
                try {
                    const fullText = pendingSaveText + ' ' + text;
                    const response = await fetch('/api/chat/confirm_save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, pending_text: fullText })
                    });
                    const data = await response.json();
                    if (data.text) {
                        addBubble('assistant', data.text);
                    }
                    pendingSaveText = null;
                    showPendingIndicator(false);
                } catch (e) {
                    addBubble('assistant', '保存出了点问题: ' + e.message);
                }
                
                setLoading(false);
                setStatus('准备就绪');
                return;
            }

            addBubble('user', text);
            input.value = '';
            autoResizeTextarea();
            setLoading(true);
            setStatus('正在处理...');
            showTypingIndicator();
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                if (data.error) {
                    addBubble('assistant', '哎呀，出了点小问题: ' + data.error);
                    setStatus('出错了');
                    // 语音模式下出错也要继续监听，否则会卡住
                    if (voiceVadActive) {
                        continueVoiceLoop();
                    }
                } else {
                    if (data.pending_save) {
                        pendingSaveText = data.pending_save;
                        showPendingIndicator(true);
                    }

                    addBubble('assistant', data.text);

                    if (data.results && data.results.length > 0) {
                        showResults(data.results);
                    }

                    // 语音模式下自动朗读回复
                    if (voiceVadActive) {
                        if (data.text) {
                            // 如果有搜索结果，把结果内容也加入朗读
                            let textToSpeak = data.text;
                            if (data.results && data.results.length > 0) {
                                const r = data.results[0];
                                const summary = r.summary || r.body || '';
                                if (summary && summary.length < 100) {
                                    textToSpeak += '。' + summary;
                                }
                            }
                            speakText(textToSpeak);
                        } else {
                            // 没有回复文本，直接继续监听
                            continueVoiceLoop();
                        }
                    }
                    voiceReplyEnabled = false;
                }

            } catch (e) {
                addBubble('assistant', '网络好像不太给力，稍后再试试？');
                setStatus('网络错误');
                // 语音模式下网络错误也要继续监听
                if (voiceVadActive) {
                    continueVoiceLoop();
                }
            }

            hideTypingIndicator();
            setLoading(false);
            setStatus('准备就绪');
        }

        function showTypingIndicator() {
            const view = document.getElementById('chat-view');
            // 移除已有的
            const existing = view.querySelector('.typing-indicator');
            if (existing) existing.remove();
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            view.appendChild(indicator);
            setTimeout(scrollToBottom, 50);
        }

        function hideTypingIndicator() {
            const view = document.getElementById('chat-view');
            const indicator = view.querySelector('.typing-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            const view = document.getElementById('chat-view');
            view.scrollTop = view.scrollHeight;
        }

        function addBubble(type, text) {
            const view = document.getElementById('chat-view');
            
            const welcome = view.querySelector('.welcome');
            if (welcome) {
                welcome.remove();
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble bubble-' + type;
            
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            if (type === 'assistant') {
                bubble.innerHTML = '<span class="bubble-name">暖暖 · ' + timeStr + '</span>' + escapeHtml(text).replace(/\n/g, '<br>');
            } else {
                bubble.innerHTML = escapeHtml(text).replace(/\n/g, '<br>') + '<div style="font-size:11px;opacity:0.6;text-align:right;margin-top:4px;">' + timeStr + '</div>';
            }
            
            view.appendChild(bubble);
            setTimeout(scrollToBottom, 50);
        }

        function showResults(results) {
            const view = document.getElementById('chat-view');
            const container = document.createElement('div');
            container.className = 'bubble-results';

            const title = document.createElement('div');
            title.className = 'results-title';
            title.textContent = '相关记忆';
            container.appendChild(title);

            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                // 点击卡片 - 不再自动搜索，让用户选择操作
                div.addEventListener('click', function(e) {
                    // 如果点击的是按钮或其子元素，忽略
                    if (e.target.closest('.btn-small') || e.target.tagName === 'IMG') return;
                    
                    // 高亮当前选中的卡片
                    document.querySelectorAll('.result-item.selected').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    
                    // 提示用户使用按钮操作
                    setStatus('💡 请使用「📋 复制记忆」或「🖼️ 查看大图」按钮');
                    setTimeout(() => setStatus('准备就绪'), 2000);
                });
                
                let html = `<div class="result-title">${escapeHtml(item.title || '无标题')}</div>`;
                if (item.summary) {
                    html += `<div class="result-summary">${escapeHtml(item.summary)}</div>`;
                }
                if (item.time) {
                    html += `<div class="result-time">${escapeHtml(item.time)}</div>`;
                }
                
                const filePath = (item.file_path || '').trim();
                
                // 显示图片预览（如果有图片）
                const isImageFile = filePath && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(filePath);
                if (isImageFile) {
                    // 生成唯一的图片ID用于后续引用
                    const imgId = 'mem-img-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
                    html += `<img class="result-image" id="${imgId}" src="/api/file/image?path=${encodeURIComponent(filePath)}" alt="预览" loading="lazy" data-full-src="/api/file/image?path=${encodeURIComponent(filePath)}">`;
                }
                
                // 准备要复制的文本内容
                let copyContent = '';
                if (item.body && item.body !== item.title) {
                    copyContent = escapeHtml(item.body);
                } else if (item.summary) {
                    copyContent = escapeHtml(item.summary);
                } else if (item.title) {
                    copyContent = escapeHtml(item.title);
                }
                
                html += `<div class="result-actions">`;
                html += `<button class="btn-small" onclick="copyMemory(event, ${JSON.stringify(item).replace(/"/g, '&quot;')})">📋 复制记忆</button>`;
                if (isImageFile) {
                    // 直接使用当前卡片的图片元素来放大
                    html += `<button class="btn-small" onclick="zoomImage(this)">🖼️ 查看大图</button>`;
                }
                html += `</div>`;
                
                div.innerHTML = html;
                container.appendChild(div);
            });

            view.appendChild(container);
            setTimeout(scrollToBottom, 50);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ====== 语音系统 ======

        // 检测浏览器音频支持
        function detectAudioSupport() {
            if (!window.MediaRecorder) {
                mediaRecorderSupported = false;
                return;
            }
            const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
            for (const t of types) {
                if (MediaRecorder.isTypeSupported(t)) {
                    mediaRecorderSupported = true;
                    selectedMimeType = t;
                    return;
                }
            }
            mediaRecorderSupported = false;
        }

        // ========== 语音对话系统 v3 - 实时VAD连续对话 ==========
        // 点击🎤 → 进入语音模式 → VAD自动检测说话 → 录音 → 自动停止 → 识别 → 朗读 → VAD监听...
        // 再点击🎤 → 退出语音模式
        // 朗读时说话 → 自动打断并开始新录音
        let voiceState = 'idle'; // idle, listening, recording, processing, speaking
        let voiceMicStream = null;      // 持续的麦克风流
        let voiceAudioContext = null;   // Web Audio API 上下文
        let voiceAnalyser = null;       // 音频分析器
        let voiceRecorder = null;       // MediaRecorder
        let voiceVadActive = false;     // VAD循环是否运行中
        let voiceVadTimeout = null;     // 静音检测定时器
        let voiceEnergyBuffer = [];     // 音频能量缓冲区
        const VAD_THRESHOLD = 0.02;     // 语音检测阈值
        const VAD_SILENCE_MS = 1000;    // 静音超过此时间停止录音
        const VAD_MIN_RECORD_MS = 800;  // 最少录音时间
        let voiceRecordStartTime = 0;   // 录音开始时间

        // 点击语音按钮
        async function toggleVoice() {
            if (voiceState === 'idle') {
                await enterVoiceMode();
            } else {
                exitVoiceMode();
            }
        }

        // 进入语音对话模式
        async function enterVoiceMode() {
            detectAudioSupport();
            if (!mediaRecorderSupported) {
                setStatus('当前浏览器不支持语音录制');
                return;
            }

            try {
                // 获取麦克风流（持续保持）
                voiceMicStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 16000
                    }
                });

                // 初始化 Web Audio API 用于 VAD
                voiceAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (voiceAudioContext.state === 'suspended') {
                    await voiceAudioContext.resume();
                }

                voiceAnalyser = voiceAudioContext.createAnalyser();
                voiceAnalyser.fftSize = 512;
                voiceAnalyser.smoothingTimeConstant = 0.3;

                const source = voiceAudioContext.createMediaStreamSource(voiceMicStream);
                source.connect(voiceAnalyser);

                voiceState = 'listening';
                isVoiceMode = true;
                voiceVadActive = true;
                updateVoiceButton();
                setStatus('👂 语音模式 · 请说话...');

                // 启动 VAD 监听循环
                vadLoop();

            } catch (e) {
                console.error('语音模式启动失败:', e);
                setStatus('无法访问麦克风: ' + e.message);
                exitVoiceMode();
            }
        }

        // 退出语音模式
        function exitVoiceMode() {
            voiceVadActive = false;
            voiceState = 'idle';
            isVoiceMode = false;
            isRecording = false;

            if (voiceVadTimeout) {
                clearTimeout(voiceVadTimeout);
                voiceVadTimeout = null;
            }

            if (voiceRecorder && voiceRecorder.state !== 'inactive') {
                try { voiceRecorder.stop(); } catch(e) {}
            }

            if (voiceMicStream) {
                voiceMicStream.getTracks().forEach(t => t.stop());
                voiceMicStream = null;
            }

            if (voiceAudioContext) {
                voiceAudioContext.close();
                voiceAudioContext = null;
            }

            voiceAnalyser = null;
            voiceEnergyBuffer = [];

            // 停止播放
            if (window._currentAudio) {
                window._currentAudio.pause();
                window._currentAudio = null;
            }

            document.getElementById('audio-indicator').style.display = 'none';
            updateVoiceButton();
            setStatus('语音模式已退出');
            setTimeout(() => setStatus('准备就绪'), 1500);
        }

        // VAD 检测循环
        function vadLoop() {
            if (!voiceVadActive) return;

            if (voiceState === 'listening') {
                const hasVoice = checkVoiceActivity();

                if (hasVoice) {
                    // 检测到语音，开始录音
                    startRecordingFromVAD();
                } else {
                    // 继续监听
                    requestAnimationFrame(vadLoop);
                }
            } else if (voiceState === 'recording') {
                // 录音中，检查是否静音
                const hasVoice = checkVoiceActivity();

                if (hasVoice) {
                    // 有声音，重置静音定时器
                    if (voiceVadTimeout) {
                        clearTimeout(voiceVadTimeout);
                        voiceVadTimeout = null;
                    }
                } else if (!voiceVadTimeout) {
                    // 开始静音检测
                    const recordDuration = Date.now() - voiceRecordStartTime;
                    const silenceDelay = Math.max(300, VAD_SILENCE_MS - (recordDuration < 2000 ? 400 : 0));

                    voiceVadTimeout = setTimeout(() => {
                        if (voiceState === 'recording') {
                            stopRecordingFromVAD();
                        }
                        voiceVadTimeout = null;
                    }, silenceDelay);
                }

                requestAnimationFrame(vadLoop);
            }
            // processing / speaking 状态不跑 VAD 循环
        }

        // 检查是否有语音活动
        function checkVoiceActivity() {
            if (!voiceAnalyser) return false;

            const bufferLength = voiceAnalyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            voiceAnalyser.getByteFrequencyData(dataArray);

            // 计算音频能量（关注人声频率 85-4000Hz）
            let sum = 0;
            const voiceEnd = Math.min(bufferLength, Math.floor(bufferLength * 0.5));
            for (let i = 0; i < voiceEnd; i++) {
                sum += dataArray[i] * dataArray[i];
            }
            const rms = Math.sqrt(sum / voiceEnd) / 128.0;

            // 滑动平均
            voiceEnergyBuffer.push(rms);
            if (voiceEnergyBuffer.length > 6) {
                voiceEnergyBuffer.shift();
            }

            const avgEnergy = voiceEnergyBuffer.reduce((a, b) => a + b, 0) / voiceEnergyBuffer.length;
            return avgEnergy > VAD_THRESHOLD;
        }

        // VAD 触发开始录音
        function startRecordingFromVAD() {
            if (voiceState !== 'listening' || !voiceMicStream) return;

            try {
                audioChunks = [];
                voiceRecorder = new MediaRecorder(voiceMicStream, {
                    mimeType: selectedMimeType || 'audio/webm'
                });

                voiceRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                voiceRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        await processVoiceRecording();
                    } else {
                        // 没有数据，回到监听
                        if (voiceVadActive) {
                            voiceState = 'listening';
                            updateVoiceButton();
                            setStatus('👂 语音模式 · 请说话...');
                            requestAnimationFrame(vadLoop);
                        }
                    }
                };

                voiceRecorder.start(50);
                voiceState = 'recording';
                voiceRecordStartTime = Date.now();
                isRecording = true;

                updateVoiceButton();
                setStatus('🎙️ 正在听你说...');
                document.getElementById('audio-indicator').style.display = 'block';
                document.getElementById('audio-indicator').innerHTML = `
                    <div class="mic-icon">🎙️</div>
                    <div>正在听...</div>
                    <div class="sub">说完停一下，我自动处理</div>
                `;

            } catch (e) {
                console.error('录音启动失败:', e);
                voiceState = 'listening';
                updateVoiceButton();
            }
        }

        // VAD 触发停止录音
        function stopRecordingFromVAD() {
            if (voiceState !== 'recording' || !voiceRecorder) return;

            const recordDuration = Date.now() - voiceRecordStartTime;
            if (recordDuration < VAD_MIN_RECORD_MS) {
                // 录音时间太短，继续录音
                return;
            }

            try {
                voiceRecorder.stop();
                voiceState = 'processing';
                isRecording = false;

                setStatus('🔄 正在识别...');
                document.getElementById('audio-indicator').innerHTML = `
                    <div class="mic-icon">🔄</div>
                    <div>正在识别...</div>
                    <div class="sub">请稍候</div>
                `;
                updateVoiceButton();
            } catch (e) {
                console.error('停止录音失败:', e);
                voiceState = 'listening';
                isRecording = false;
                updateVoiceButton();
                if (voiceVadActive) requestAnimationFrame(vadLoop);
            }
        }

        // 处理录音结果
        async function processVoiceRecording() {
            try {
                let audioBlob;
                try {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioBlob = await convertWebMToWAV(audioBlob);
                } catch (e) {
                    console.warn('音频转换失败，直接发送:', e);
                    audioBlob = new Blob(audioChunks, { type: audioChunks[0]?.type || 'audio/webm' });
                }

                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.wav');

                const response = await fetch('/api/speech_recognize', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById('audio-indicator').style.display = 'none';
                    addBubble('assistant', '没听清呢，再说一次呗~');
                    if (voiceVadActive) {
                        voiceState = 'listening';
                        voiceEnergyBuffer = [];
                        updateVoiceButton();
                        setStatus('👂 语音模式 · 请说话...');
                        requestAnimationFrame(vadLoop);
                    }
                    return;
                }

                const text = (data.text || '').trim();
                if (text) {
                    document.getElementById('audio-indicator').style.display = 'none';
                    voiceState = 'speaking';
                    updateVoiceButton();

                    document.getElementById('command-input').value = text;
                    await sendMessage();
                    // sendMessage 会触发 speakText（如果 voiceVadActive），
                    // speakText 的 onended 会调用 continueVoiceLoop 回到 listening
                } else {
                    document.getElementById('audio-indicator').style.display = 'none';
                    addBubble('assistant', '嗯？没听清，再说一次呗~');
                    if (voiceVadActive) {
                        voiceState = 'listening';
                        voiceEnergyBuffer = [];
                        updateVoiceButton();
                        setStatus('👂 语音模式 · 请说话...');
                        requestAnimationFrame(vadLoop);
                    }
                }

            } catch (error) {
                console.error('语音处理失败:', error);
                document.getElementById('audio-indicator').style.display = 'none';
                addBubble('assistant', '处理出了点问题，再试一次？');
                if (voiceVadActive) {
                    voiceState = 'listening';
                    voiceEnergyBuffer = [];
                    updateVoiceButton();
                    setStatus('👂 语音模式 · 请说话...');
                    requestAnimationFrame(vadLoop);
                }
            }
        }

        // 朗读完成后继续监听
        function continueVoiceLoop() {
            if (voiceVadActive && voiceState === 'speaking') {
                voiceState = 'listening';
                voiceEnergyBuffer = []; // 清空能量缓冲区
                updateVoiceButton();
                setStatus('👂 语音模式 · 请说话...');
                requestAnimationFrame(vadLoop);
            }
        }

        // 打断朗读（用户说话时）
        function interruptSpeaking() {
            if (voiceState === 'speaking') {
                // 停止播放
                if (window._currentAudio) {
                    window._currentAudio.pause();
                    window._currentAudio = null;
                }
                // 创建新的 MediaRecorder 开始录音
                voiceState = 'recording';
                voiceRecordStartTime = Date.now();
                isRecording = true;
                audioChunks = [];

                try {
                    voiceRecorder = new MediaRecorder(voiceMicStream, {
                        mimeType: selectedMimeType || 'audio/webm'
                    });

                    voiceRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };

                    voiceRecorder.onstop = async () => {
                        if (audioChunks.length > 0) {
                            await processVoiceRecording();
                        } else {
                            if (voiceVadActive) {
                                voiceState = 'listening';
                                updateVoiceButton();
                                setStatus('👂 语音模式 · 请说话...');
                                requestAnimationFrame(vadLoop);
                            }
                        }
                    };

                    voiceRecorder.start(50);

                    updateVoiceButton();
                    setStatus('🎙️ 打断中，请说...');
                    document.getElementById('audio-indicator').style.display = 'block';
                    document.getElementById('audio-indicator').innerHTML = `
                        <div class="mic-icon">🎙️</div>
                        <div>正在听...</div>
                        <div class="sub">说完停一下</div>
                    `;
                } catch (e) {
                    console.error('打断录音失败:', e);
                    voiceState = 'listening';
                    updateVoiceButton();
                    if (voiceVadActive) requestAnimationFrame(vadLoop);
                }
            }
        }

        // 更新语音按钮状态
        function updateVoiceButton() {
            const voiceBtn = document.getElementById('voice-btn');
            const voiceModeBar = document.getElementById('voice-mode-bar');
            const barSpan = voiceModeBar.querySelector('span');

            if (voiceState === 'recording') {
                voiceBtn.textContent = '⏹️';
                voiceBtn.title = '正在录音...';
                voiceBtn.classList.add('recording');
                voiceModeBar.classList.add('active');
                barSpan.textContent = '正在听你说... 停一下自动处理';
            } else if (voiceState === 'processing') {
                voiceBtn.textContent = '🔄';
                voiceBtn.title = '识别中...';
                voiceBtn.classList.add('recording');
                voiceModeBar.classList.add('active');
                barSpan.textContent = '正在识别语音...';
            } else if (voiceState === 'speaking') {
                voiceBtn.textContent = '🔊';
                voiceBtn.title = '正在朗读...说话可打断';
                voiceBtn.classList.add('recording');
                voiceModeBar.classList.add('active');
                barSpan.textContent = '正在朗读 · 说话可以打断我';
            } else if (voiceState === 'listening') {
                voiceBtn.textContent = '🎤';
                voiceBtn.title = '语音模式 · 点击退出';
                voiceBtn.classList.remove('recording');
                voiceBtn.style.borderColor = '#10b981';
                voiceBtn.style.background = 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)';
                voiceBtn.style.color = '#065f46';
                voiceModeBar.classList.add('active');
                barSpan.textContent = '语音模式 · 请说话 · 点击🎤退出';
            } else {
                voiceBtn.textContent = '🎤';
                voiceBtn.title = '点击开始语音对话';
                voiceBtn.classList.remove('recording');
                voiceBtn.style.borderColor = '';
                voiceBtn.style.background = '';
                voiceBtn.style.color = '';
                voiceModeBar.classList.remove('active');
            }
        }

        // 长按：按住说话，松开发送（单次录音模式）
        let longPressTimer = null;

        // 旧版语音函数已被新语音系统替代

        // 将 WebM 转换为 WAV 格式（百度ASR需要WAV）
        async function convertWebMToWAV(webmBlob) {
            const arrayBuffer = await webmBlob.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

            // 重采样到16kHz（百度ASR需要）
            const targetSampleRate = 16000;
            const resampledBuffer = resampleAudio(audioBuffer, targetSampleRate);

            const wavData = audioBufferToWav(resampledBuffer, targetSampleRate);
            audioContext.close();
            return new Blob([wavData], { type: 'audio/wav' });
        }

        // 重采样音频
        function resampleAudio(audioBuffer, targetSampleRate) {
            const sourceSampleRate = audioBuffer.sampleRate;
            const sourceLength = audioBuffer.length;
            const targetLength = Math.round(sourceLength * targetSampleRate / sourceSampleRate);
            const sourceData = audioBuffer.getChannelData(0);

            // 创建新的缓冲区（模拟）
            const resampledData = new Float32Array(targetLength);

            // 简单线性插值重采样
            for (let i = 0; i < targetLength; i++) {
                const sourceIndex = i * sourceSampleRate / targetSampleRate;
                const index = Math.floor(sourceIndex);
                const fraction = sourceIndex - index;

                if (index + 1 < sourceLength) {
                    resampledData[i] = sourceData[index] * (1 - fraction) + sourceData[index + 1] * fraction;
                } else {
                    resampledData[i] = sourceData[index] || 0;
                }
            }

            return {
                length: targetLength,
                sampleRate: targetSampleRate,
                getChannelData: () => resampledData
            };
        }

        // 将 AudioBuffer 转换为 WAV 格式
        function audioBufferToWav(audioBuffer, sampleRate) {
            const numChannels = 1; // 单声道
            const format = 1; // PCM
            const bitDepth = 16;

            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            const numFrames = audioBuffer.length;
            const dataSize = numFrames * blockAlign;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            // 写入PCM数据
            const channelData = audioBuffer.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < numFrames; i++) {
                const sample = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }

            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // 旧版 recognizeAudio 已被 processVoiceRecording 替代

        async function speakText(text) {
            try {
                let cleanText = text.replace(/\n/g, ' ')
                    .replace(/（[^）]+）/g, '')
                    .replace(/https?:\/\/\S+/g, '')
                    .replace(/\*\*/g, '')
                    .replace(/[#*`\-_]/g, '')
                    .trim();
                if (!cleanText) {
                    continueVoiceLoop();
                    return;
                }
                cleanText = cleanText.slice(0, 280);

                const response = await fetch('/api/speech_synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: cleanText })
                });

                const data = await response.json();
                if (data.error) {
                    console.warn('语音合成失败:', data.error);
                    continueVoiceLoop();
                    return;
                }

                const audioB64 = data.audio;
                const audioBytes = Uint8Array.from(atob(audioB64), c => c.charCodeAt(0));
                const audioBlob = new Blob([audioBytes], { type: 'audio/mpeg' });

                if (window._currentAudio) {
                    window._currentAudio.pause();
                    window._currentAudio = null;
                }

                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio._blobUrl = audioUrl;
                window._currentAudio = audio;

                // 启动打断检测
                if (voiceVadActive) {
                    startBargeInDetection();
                }

                audio.play().catch(err => {
                    console.warn('音频播放失败:', err);
                    continueVoiceLoop();
                });

                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    if (window._currentAudio === audio) {
                        window._currentAudio = null;
                    }
                    continueVoiceLoop();
                };

            } catch (e) {
                console.error('语音播放失败:', e);
                continueVoiceLoop();
            }
        }

        // 打断检测：朗读时检测用户说话
        let bargeInInterval = null;
        function startBargeInDetection() {
            if (bargeInInterval) clearInterval(bargeInInterval);
            bargeInInterval = setInterval(() => {
                if (voiceState !== 'speaking' || !voiceAnalyser) {
                    clearInterval(bargeInInterval);
                    bargeInInterval = null;
                    return;
                }
                const hasVoice = checkVoiceActivity();
                if (hasVoice) {
                    clearInterval(bargeInInterval);
                    bargeInInterval = null;
                    interruptSpeaking();
                }
            }, 200);
        }

        // 插入样式

        // 创建暂存区域
        const inputArea = document.getElementById('drop-area');
        const filePendingArea = document.createElement('div');
        filePendingArea.className = 'file-pending-area';
        filePendingArea.id = 'file-pending-area';
        filePendingArea.innerHTML = `
            <div class="file-pending-header">
                <span>📎 待上传的文件 (<span id="pending-count">0</span>)</span>
                <button onclick="clearPendingFiles()" style="background:none;border:none;color:#999;cursor:pointer;font-size:18px;line-height:1;">✕</button>

                       style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;">
                <button class="btn-confirm-upload" onclick="confirmUploadFiles()">📤 确认上传</button>

        `;
        inputArea.parentNode.insertBefore(filePendingArea, inputArea);

        function updatePendingUI() {
            const area = document.getElementById('file-pending-area');
            const list = document.getElementById('pending-file-list');
            const count = document.getElementById('pending-count');
            
            if (pendingFiles.length === 0) {
                area.style.display = 'none';
                return;
            }
            
            area.style.display = 'block';
            count.textContent = pendingFiles.length;
            
            list.innerHTML = '';
            pendingFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-preview-item';
                
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.className = 'file-preview-thumb';
                    img.onload = () => URL.revokeObjectURL(img.src);
                    item.appendChild(img);
                } else {
                    const icon = document.createElement('span');
                    icon.textContent = '📄';
                    icon.style.fontSize = '24px';
                    item.appendChild(icon);
                }
                
                const name = document.createElement('span');
                name.className = 'file-preview-name';
                name.title = file.name;
                name.textContent = file.name;
                item.appendChild(name);
                
                const removeBtn = document.createElement('span');
                removeBtn.className = 'file-remove-btn';
                removeBtn.textContent = '✕';
                removeBtn.onclick = () => removePendingFile(index);
                item.appendChild(removeBtn);
                
                list.appendChild(item);
            });
        }

        function removePendingFile(index) {
            pendingFiles.splice(index, 1);
            updatePendingUI();
        }

        function clearPendingFiles() {
            pendingFiles = [];
            updatePendingUI();
            setStatus('准备就绪');
        }

        function addFilesToPending(files) {
            for (const file of files) {
                pendingFiles.push(file);
            }
            updatePendingUI();
            
            if (pendingFiles.length > 0) {
                setStatus(`已选择 ${pendingFiles.length} 个文件，请点击「确认上传」`);
            }
        }

        async function confirmUploadFiles() {
            if (pendingFiles.length === 0) return;
            
            setLoading(true);
            setStatus('正在上传...');

            const caption = document.getElementById('file-caption').value.trim();

            const formData = new FormData();
            for (let i = 0; i < pendingFiles.length; i++) {
                formData.append('files', pendingFiles[i]);
            }
            if (caption) {
                formData.append('caption', caption);
            }

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                // 先记录数量再清空
                const uploadedCount = pendingFiles.length;
                
                // 清空暂存
                clearPendingFiles();
                document.getElementById('file-caption').value = '';
                
                if (data.success) {
                    addBubble('user', `[上传${caption ? ': ' + caption : ''}] ${uploadedCount}个文件`);
                    addBubble('assistant', data.message || '文件已保存到记忆库。');
                } else {
                    addBubble('assistant', '上传失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                addBubble('assistant', '上传失败: ' + e.message);
            }

            setLoading(false);
            setStatus('准备就绪');
        }

        const dropArea = document.getElementById('drop-area');
        
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('drop-active');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('drop-active');
        });

        dropArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropArea.classList.remove('drop-active');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                // 暂存文件而不是直接上传
                addFilesToPending(files);
            }
        });

        });

        chatView.addEventListener('dragleave', () => {
            chatView.style.background = '';
        });

        chatView.addEventListener('drop', async (e) => {
            e.preventDefault();
            chatView.style.background = '';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                addFilesToPending(files);
            }

        detectAudioSupport();
        
        // 性能监控
        window.performanceData = {
            apiCalls: 0,
            totalResponseTime: 0,
            errors: 0
        };
        
        // 拦截fetch请求进行性能监控
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const startTime = performance.now();
            window.performanceData.apiCalls++;
            
            try {
                const response = await originalFetch.apply(this, args);
                const duration = performance.now() - startTime;
                window.performanceData.totalResponseTime += duration;
                
                if (!response.ok) {
                    window.performanceData.errors++;
                }
                
                return response;
            } catch (error) {
                window.performanceData.errors++;
                throw error;
            }
        };
