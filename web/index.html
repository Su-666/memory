<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="暖暖记忆助手 - 你的贴心记忆小助手">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>暖暖 - 记忆助手</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d5e58;
            --primary-glow: rgba(20, 184, 166, 0.15);
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(15, 118, 110, 0.06);
            --card-shadow: 0 2px 16px rgba(15, 118, 110, 0.06), 0 0 1px rgba(15, 118, 110, 0.08);
            --text-primary: #1a2726;
            --text-secondary: #4a6a62;
            --text-muted: #7a9a8e;
            --assistant-bg: rgba(255, 255, 255, 0.6);
            --user-bg: linear-gradient(135deg, rgba(13, 107, 100, 0.7) 0%, rgba(15, 118, 110, 0.7) 50%, rgba(20, 168, 154, 0.7) 100%);
            --user-shadow: 0 4px 16px rgba(15, 118, 110, 0.15);
            --border-radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --shadow: 0 2px 16px rgba(15, 118, 110, 0.06);
            --shadow-hover: 0 6px 24px rgba(15, 118, 110, 0.1);
            --shadow-float: 0 12px 40px rgba(15, 118, 110, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(15, 118, 110, 0.08);
            --gold: #b8860b;
            --gold-bg: linear-gradient(135deg, #fff9f0 0%, #fff3e0 100%);
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
            --glow-warm: #FEF3C7;
            --glow-cool: #5eead4;
            --aurora-white: #fff;
            --aurora-black: #000;
            --aurora-transparent: transparent;
            --aurora-blue-500: #3b82f6;
            --aurora-indigo-300: #a5b4fc;
            --aurora-blue-300: #93c5fd;
            --aurora-violet-200: #ddd6fe;
            --aurora-blue-400: #60a5fa;
            --aurora-invert: 1;
            --vt-x: 50%;
            --vt-y: 50%;
            --vt-duration: 520ms;
            --vt-easing: ease-out;
        }

        /* ═══ View Transitions — 主题切换动画 ═══ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #fafafa;
            min-height: 100vh;
            min-height: 100dvh;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.5s ease;
        }

        .header {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid var(--card-border);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px) saturate(1.4);
            -webkit-backdrop-filter: blur(12px) saturate(1.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .header-badge {
            background: var(--gold-bg);
            color: var(--gold);
            border: 1px solid rgba(218, 165, 32, 0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            width: fit-content;
        }

        .header-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ═══ Button System — shadcn inspired ═══ */
        .h-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s var(--transition);
            outline: none;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
        }

        .h-btn:focus-visible {
            outline: 2px solid rgba(20, 184, 166, 0.5);
            outline-offset: 2px;
        }

        .h-btn:disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        .h-btn svg {
            width: 16px;
            height: 16px;
            pointer-events: none;
            flex-shrink: 0;
        }

        /* Size: sm (h-8) */
        .h-btn-sm {
            height: 32px;
            padding: 0 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        /* Size: icon (h-9 w-9) */
        .h-btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
        }

        /* Variant: ghost */
        .h-btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text-secondary);
        }

        .h-btn-ghost:hover {
            background: rgba(15, 118, 110, 0.08);
            color: var(--primary);
        }

        /* Variant: destructive (for clear) */
        .h-btn-destructive {
            background: transparent;
            border-color: var(--card-border);
            color: var(--text-secondary);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .h-btn-destructive:hover {
            background: rgba(220, 38, 38, 0.06);
            border-color: rgba(220, 38, 38, 0.2);
            color: #dc2626;
        }

        /* Variant: gold outline (for stats) */
        .h-btn-gold {
            background: var(--gold-bg);
            border-color: rgba(218, 165, 32, 0.2);
            color: var(--gold);
            font-weight: 600;
        }

        .h-btn-gold:hover {
            box-shadow: 0 3px 12px rgba(218, 165, 32, 0.15);
            transform: translateY(-1px);
        }

        /* Rounded-full modifier */
        .h-btn-rounded {
            border-radius: 9999px;
        }

        body.dark-mode {
            --card-bg: rgba(22, 38, 35, 0.7);
            --card-border: rgba(20, 168, 154, 0.08);
            --card-shadow: 0 2px 16px rgba(0, 0, 0, 0.2), 0 0 1px rgba(20, 168, 154, 0.1);
            --text-primary: #d8e8e4;
            --text-secondary: #8ab8a8;
            --text-muted: #5a8a78;
            --assistant-bg: rgba(22, 38, 35, 0.65);
            --user-bg: linear-gradient(135deg, rgba(15, 118, 110, 0.7) 0%, rgba(20, 168, 154, 0.7) 50%, rgba(32, 212, 184, 0.7) 100%);
            --user-shadow: 0 4px 16px rgba(20, 168, 154, 0.12);
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
            --shadow-hover: 0 6px 24px rgba(0, 0, 0, 0.2);
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.25);
            --glass-bg: rgba(15, 40, 36, 0.85);
            --glass-border: rgba(20, 168, 154, 0.1);
            --gold: #e8c878;
            --gold-bg: linear-gradient(135deg, rgba(20, 61, 56, 0.9) 0%, rgba(30, 70, 60, 0.9) 100%);
            --glow-warm: #92700a;
            --glow-cool: #0d9488;
            --aurora-invert: 0;
            background: #18181b;
        }

        body.dark-mode .aurora-bg__layer {
            background-image: var(--dark-gradient), var(--aurora);
        }

        body.dark-mode .aurora-bg__layer::after {
            background-image: var(--dark-gradient), var(--aurora);
        }

        body.dark-mode .header {
            background: rgba(24, 24, 27, 0.6);
        }

        body.dark-mode .input-area {
            background: rgba(22, 38, 35, 0.88);
            border-color: rgba(20, 168, 154, 0.08);
        }

        body.dark-mode .typing-indicator {
            background: rgba(22, 38, 35, 0.65);
            border-color: rgba(20, 168, 154, 0.08);
        }

        body.dark-mode .welcome {
            color: var(--text-secondary);
        }

        body.dark-mode .welcome .tip-item {
            background: linear-gradient(135deg, rgba(22, 38, 35, 0.9) 0%, rgba(18, 32, 28, 0.9) 100%);
            border-color: var(--card-border);
        }

        body.dark-mode .bubble-results {
            background: linear-gradient(135deg, rgba(22, 38, 35, 0.85) 0%, rgba(18, 32, 28, 0.85) 100%);
            border-color: var(--card-border);
        }

        body.dark-mode .result-item {
            background: var(--card-bg);
            border-color: var(--card-border);
        }

        body.dark-mode .result-item:hover {
            background: linear-gradient(135deg, rgba(25, 45, 40, 0.95) 0%, rgba(20, 38, 34, 0.95) 100%);
        }

        body.dark-mode .btn-attach:hover,
        body.dark-mode .btn-voice:hover {
            background: rgba(20, 168, 154, 0.12);
            color: var(--primary-light);
        }

        body.dark-mode .btn-send {
            background: #d8e8e4;
            color: #18181b;
        }

        body.dark-mode .btn-send:hover:not(:disabled) {
            background: #e8f0ec;
        }

        body.dark-mode .btn-send:disabled {
            background: rgba(216, 232, 228, 0.3);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            min-height: 0;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            min-height: 0;
            backdrop-filter: blur(8px);
        }

        .chat-view {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(15, 118, 110, 0.12) transparent;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: transparent;
        }

        .chat-view::-webkit-scrollbar {
            width: 5px;
        }

        .chat-view::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-view::-webkit-scrollbar-thumb {
            background: rgba(15, 118, 110, 0.12);
            border-radius: 4px;
        }

        .chat-view::-webkit-scrollbar-thumb:hover {
            background: rgba(15, 118, 110, 0.25);
        }

        .bubble-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: bubbleIn 0.3s var(--transition);
        }

        .bubble-row.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .avatar.assistant {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
        }

        .avatar.user {
            background: linear-gradient(135deg, #5a7a72 0%, #7a9a92 100%);
        }

        .bubble {
            max-width: 100%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .bubble-row .col {
            min-width: 0;
            max-width: 75%;
            flex: 0 1 auto;
            display: flex;
            flex-direction: column;
        }

        .bubble-row.user .col {
            align-items: flex-end;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--user-bg);
            border: none;
            color: #ffffff;
            box-shadow: var(--user-shadow);
        }

        .bubble-assistant {
            align-self: flex-start;
            background: var(--assistant-bg);
            border: none;
            color: var(--text-primary);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .time-separator {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.5;
            padding: 8px 0;
            user-select: none;
        }

        .bubble-results {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(240, 253, 250, 0.85) 0%, rgba(204, 251, 241, 0.85) 100%);
            border: 1px solid rgba(15, 118, 110, 0.06);
            border-radius: var(--border-radius);
            padding: 18px;
            max-width: 92%;
            animation: bubbleIn 0.3s var(--transition);
            backdrop-filter: blur(10px);
        }

        .results-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.03em;
        }

        .results-title::before {
            content: "📋";
        }

        .result-item {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(15, 118, 110, 0.06);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.25s var(--transition);
            backdrop-filter: blur(6px);
        }

        .result-item:hover {
            border-color: rgba(20, 184, 166, 0.15);
            background: rgba(240, 253, 250, 0.95);
            box-shadow: var(--shadow-hover);
            transform: translateX(4px);
        }

        .result-item.selected {
            border-color: var(--primary) !important;
            background: rgba(204, 251, 241, 0.95) !important;
            box-shadow: 0 4px 20px rgba(15, 118, 110, 0.15) !important;
            transform: translateX(4px);
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 6px;
        }

        .result-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .result-time {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-image {
            max-width: 280px;
            max-height: 180px;
            border-radius: var(--radius-xs);
            margin-top: 10px;
            object-fit: cover;
            border: 1px solid rgba(15, 118, 110, 0.08);
            transition: transform 0.3s var(--transition);
        }

        .result-image:hover {
            transform: scale(1.03);
        }

        .result-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .btn-small {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-xs);
            padding: 7px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s var(--transition);
        }

        .btn-small:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(15, 118, 110, 0.2);
        }

        /* ═══ Input Area — Card Style ═══ */
        .input-area {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            margin: 0 16px 12px 16px;
            padding: 0;
            backdrop-filter: blur(16px);
            box-shadow: 0 2px 12px rgba(15, 118, 110, 0.06);
            transition: all 0.25s var(--transition);
        }

        .input-area:focus-within {
            border-color: rgba(20, 184, 166, 0.25);
            box-shadow: 0 2px 16px rgba(15, 118, 110, 0.1);
        }

        .command-input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 0;
            font-size: 15px;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            overflow: hidden;
            min-height: 44px;
            max-height: 200px;
            line-height: 1.5;
            -webkit-appearance: none;
            appearance: none;
        }

        .command-input::placeholder {
            color: var(--text-muted);
        }

        /* ── Bottom Toolbar ── */
        .input-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px 8px 10px;
        }

        .toolbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Send button — dark themed */
        .btn-send {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1a2726;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.25s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-send:hover:not(:disabled) {
            background: #0f1f1d;
            transform: scale(1.08);
        }

        .btn-send:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            background: rgba(26, 39, 38, 0.35);
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
        }

        /* Attach button */
        .btn-attach {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-attach:hover {
            background: rgba(15, 118, 110, 0.08);
            color: var(--primary);
        }

        .btn-attach svg {
            width: 20px;
            height: 20px;
        }

        /* Voice button */
        .btn-voice {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-voice:hover {
            background: rgba(15, 118, 110, 0.08);
            color: var(--primary);
        }

        .btn-voice svg {
            width: 20px;
            height: 20px;
        }

        .btn-voice.active {
            animation: voicePulse 1.8s ease-in-out infinite;
            color: var(--primary);
        }

        @keyframes voicePulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.35);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(20, 184, 166, 0);
            }
        }

        .status-bar {
            margin-top: 12px;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .loading-dots {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .loading-dots span {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary);
            animation: loadingBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingBounce {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        /* 打字指示器 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 16px 20px;
            background: var(--assistant-bg);
            border: none;
            border-radius: var(--border-radius);
            align-self: flex-start;
            animation: bubbleIn 0.3s var(--transition);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .typing-indicator .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary);
            animation: typingDot 1.4s ease-in-out infinite;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .welcome {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-secondary);
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
            animation: welcomeFloat 3s ease-in-out infinite;
        }

        @keyframes welcomeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome h2 {
            font-size: 32px;
            font-weight: 900;

        /* Toast 通知 */
        .toast-container {

            gap: 10px;

            font-weight: 600;

            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }

        @keyframes toastOut {

        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .aurora-bg__layer {
            --white-gradient: repeating-linear-gradient(100deg, var(--aurora-white) 0%, var(--aurora-white) 7%, var(--aurora-transparent) 10%, var(--aurora-transparent) 12%, var(--aurora-white) 16%);
            --dark-gradient: repeating-linear-gradient(100deg, var(--aurora-black) 0%, var(--aurora-black) 7%, var(--aurora-transparent) 10%, var(--aurora-transparent) 12%, var(--aurora-black) 16%);
            --aurora: repeating-linear-gradient(100deg, var(--aurora-blue-500) 10%, var(--aurora-indigo-300) 15%, var(--aurora-blue-300) 20%, var(--aurora-violet-200) 25%, var(--aurora-blue-400) 30%);
            background-image: var(--white-gradient), var(--aurora);
            background-size: 300% 200%;
            background-position: 50% 50%, 50% 50%;
            filter: blur(10px) invert(var(--aurora-invert));
            position: absolute;
            inset: -10px;
            opacity: 0.5;
            will-change: transform;
            -webkit-mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
            mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
        }

        .aurora-bg__layer::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: var(--white-gradient), var(--aurora);
            background-size: 200% 100%;
            background-attachment: fixed;
            mix-blend-mode: difference;
            animation: aurora 60s linear infinite;

        @keyframes aurora {
            from {
                background-position: 50% 50%, 50% 50%;

        /* ═══ Chat Area Glow ═══ */

                var(--card-bg);
            background-size: 100% 100%;
        }

        /* Ensure main UI layers above aurora */
        .main, .status-bar {
            position: relative;
            z-index: 1;
        }

        html {
            view-transition-name: root;
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        html[data-theme-to="dark"]::view-transition-new(root) { z-index: 2; }
        html[data-theme-to="dark"]::view-transition-old(root) { z-index: 1; }
        html[data-theme-to="light"]::view-transition-old(root) { z-index: 2; }
        html[data-theme-to="light"]::view-transition-new(root) { z-index: 1; }

        html[data-theme-to="dark"]::view-transition-new(root) {
            clip-path: circle(0px at var(--vt-x) var(--vt-y));
            animation: vt-radial-in var(--vt-duration) var(--vt-easing) forwards;
        }

        html[data-theme-to="light"]::view-transition-old(root) {
            clip-path: circle(var(--vt-end-radius, 0px) at var(--vt-x) var(--vt-y));
            animation: vt-radial-out var(--vt-duration) var(--vt-easing) forwards;
        }

        @keyframes vt-radial-in {
            from { clip-path: circle(0px at var(--vt-x) var(--vt-y)); }
            to   { clip-path: circle(var(--vt-end-radius, 0px) at var(--vt-x) var(--vt-y)); }
        }

        @keyframes vt-radial-out {
            from { clip-path: circle(var(--vt-end-radius, 0px) at var(--vt-x) var(--vt-y)); }
            to   { clip-path: circle(0px at var(--vt-x) var(--vt-y)); }
        }
    </style>

    <script>
        const DEBUG = false;
        const dlog = DEBUG ? console.log.bind(console) : () => {};
        const dwarn = DEBUG ? console.warn.bind(console) : () => {};

        let pendingSaveText = null;

        // 缓存常用 DOM 引用（避免重复查询）
        const $sendBtn = document.getElementById('send-btn');
        const $commandInput = document.getElementById('command-input');
        const $chatView = document.getElementById('chat-view');
        const $status = document.getElementById('status');
        const $loading = document.getElementById('loading');
        const $pendingIndicator = document.getElementById('pending-indicator');
        const $voiceBtn = document.getElementById('voice-btn');
        const $imageModal = document.getElementById('image-modal');
        const $modalImage = document.getElementById('modal-image');
        const $modalError = document.getElementById('modal-error');

        // 欢迎屏幕模板（避免重复 HTML）
        function getWelcomeHTML() {
            return `<div class="welcome">
                <div class="welcome-icon">🌸</div>
                <h2>嗨，我是暖暖~</h2>
                <p>告诉我你想记住什么，或者问我"之前记过啥"</p>
                <p style="font-size:13px; opacity:0.7;">点击 🎤 可以语音聊天哦</p>
                <div class="tips">
                    <div class="tip-item">💬 说：「帮我记住手机号138xxxx」</div>
                    <div class="tip-item">🔍 问：「我之前记过什么？」</div>
                    <div class="tip-item">🎤 点麦克风开始语音聊天</div>
                    <div class="tip-item">📁 拖文件到输入框可以上传</div>
                </div>
            </div>`;
        }

        // 语音对话相关变量
        let mediaRecorderSupported = false;
        let selectedMimeType = '';

        // 输入框自动调整高度
        function autoResizeTextarea() {
            $commandInput.style.height = 'auto';
            $commandInput.style.height = Math.min($commandInput.scrollHeight, 200) + 'px';
        }

        // 监听输入框输入事件
        $commandInput.addEventListener('input', function() {
            autoResizeTextarea();
            updateSendButtonState();
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function setStatus(text) {
            $status.textContent = text;
        }

        // Toast 通知系统
        function showToast(message, type = 'info', duration = 2500) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', info: '💡' };
            const safeMsg = String(message).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${safeMsg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function setLoading(show) {
            $loading.style.display = show ? 'flex' : 'none';
            if (show) {
                $sendBtn.disabled = true;
            } else {
                updateSendButtonState();
            }
        }

        function showPendingIndicator(show) {
            $pendingIndicator.style.display = show ? 'block' : 'none';
            const inputArea = document.getElementById('drop-area');
            if (show) {
                $commandInput.placeholder = '告诉我具体内容~（如：138xxxx）';
                if (inputArea) inputArea.style.borderColor = '#e8c88a';
            } else {
                $commandInput.placeholder = '跟我说说~（回车发送）';
                if (inputArea) inputArea.style.borderColor = '';
            }
        }

        async function sendMessage() {
            const text = $commandInput.value.trim();
            if (!text && !pendingSaveText) return;

            if (pendingSaveText) {
                addBubble('user', text);
                $commandInput.value = '';
                setLoading(true);
                setStatus('正在保存...');

                try {
                    const response = await fetch('/api/chat/confirm_save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, pending_text: pendingSaveText })
                    });
                    const data = await response.json();
                    if (data.text) addBubbleTypewriter('assistant', data.text);
                    pendingSaveText = null;
                    showPendingIndicator(false);
                } catch (e) {
                    addBubble('assistant', '保存出了点问题: ' + e.message);
                }

                setLoading(false);
                setStatus('准备就绪');
                return;
            }

            addBubble('user', text);
            $commandInput.value = '';
            autoResizeTextarea();
            updateSendButtonState();
            setLoading(true);
            setStatus('正在处理...');
            showTypingIndicator();
            scrollToBottom();

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    addBubble('assistant', '哎呀，出了点小问题: ' + (errData.error || response.statusText));
                    setStatus('出错了');
                    if (voiceVadActive) continueVoiceLoop();
                } else {
                    hideTypingIndicator();
                    const streamer = createStreamingBubble('assistant');
                    let pendingSave = null;
                    let results = [];
                    let done = false;

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (!done) {
                        const { value, done: streamDone } = await reader.read();
                        if (streamDone) break;
                        buffer += decoder.decode(value, { stream: true });

                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || !trimmed.startsWith('data: ')) continue;
                            try {
                                const evt = JSON.parse(trimmed.slice(6));
                                if (evt.type === 'token') {
                                    streamer.append(evt.text);
                                } else if (evt.type === 'done') {
                                    done = true;
                                } else if (evt.type === 'assistant') {
                                    // save/search 意图一次性返回
                                    if (!streamer.getText()) {
                                        streamer.append(evt.text || '');
                                    }
                                    if (evt.pending_save) pendingSave = evt.pending_save;
                                    if (evt.results) results = evt.results;
                                    done = true;
                                }
                            } catch (e) { /* ignore parse errors */ }
                        }
                    }

                    if (pendingSave) {
                        pendingSaveText = pendingSave;
                        showPendingIndicator(true);
                    }
                    if (results.length > 0) {
                        showResults(results);
                    }

                    // 语音模式下自动朗读回复
                    if (voiceVadActive) {
                        const finalText = streamer.getText();
                        if (finalText) {
                            let textToSpeak = finalText;
                            if (results.length > 0) {
                                const r = results[0];
                                const summary = r.summary || r.body || '';
                                if (summary && summary.length < 100) {
                                    textToSpeak += '。' + summary;
                                }
                            }
                            await speakText(textToSpeak);
                        } else {
                            continueVoiceLoop();
                        }
                    }
                }

            } catch (e) {
                addBubble('assistant', '网络好像不太给力，稍后再试试？');
                setStatus('网络错误');
                if (voiceVadActive) continueVoiceLoop();
            }

            hideTypingIndicator();

                scrollToBottom();
            }, 30);

        // ====== 语音系统 ======

        // 检测浏览器音频支持
        function detectAudioSupport() {
            if (!window.MediaRecorder) {
                mediaRecorderSupported = false;
                return;
            }
            const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
            for (const t of types) {
                if (MediaRecorder.isTypeSupported(t)) {
                    mediaRecorderSupported = true;
                    selectedMimeType = t;
                    return;
                }
            }
            mediaRecorderSupported = false;
        }

        // ========== 语音对话系统 v3 - 实时VAD连续对话 ==========
        // 点击🎤 → 进入语音模式 → VAD自动检测说话 → 录音 → 自动停止 → 识别 → 朗读 → VAD监听...
        // 再点击🎤 → 退出语音模式
        // 朗读时说话 → 自动打断并开始新录音
        let voiceState = 'idle'; // idle, listening, recording, processing, speaking
        let audioChunks = [];             // 录音数据块
        let voiceMicStream = null;      // 持续的麦克风流
        let voiceAudioContext = null;   // Web Audio API 上下文
        let voiceScriptNode = null;     // ScriptProcessorNode（实时VAD）
        let voiceRecorder = null;       // MediaRecorder
        let voiceVadActive = false;     // VAD是否运行中
        const VAD_RMS_THRESHOLD = 500;  // 语音开始阈值（时域RMS）
        const VAD_SILENCE_MS = 1200;    // 静音超过此时间停止录音
        const VAD_MIN_RECORD_MS = 500;  // 最少录音时间
        const VAD_MAX_RECORD_MS = 30000; // 最长录音时间（安全阀）
        let voiceRecordStartTime = 0;   // 录音开始时间
        let voiceSpeechStarted = false; // 是否已检测到语音开始

        // 点击语音按钮
        async function toggleVoice() {
            if (voiceState === 'idle') {
                await enterVoiceMode();
            } else {
                exitVoiceMode();
            }
        }

        // 进入语音对话模式
        async function enterVoiceMode() {
            detectAudioSupport();
            if (!mediaRecorderSupported) {
                setStatus('当前浏览器不支持语音录制');
                return;
            }

            try {
                voiceMicStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 16000
                    }
                });

                voiceAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                if (voiceAudioContext.state === 'suspended') {
                    await voiceAudioContext.resume();
                }

                // 创建音频源和 ScriptProcessorNode（实时VAD，类似桌面端 sd.InputStream）
                const source = voiceAudioContext.createMediaStreamSource(voiceMicStream);
                const bufferSize = 4096;
                voiceScriptNode = voiceAudioContext.createScriptProcessor(bufferSize, 1, 1);

                voiceScriptNode.onaudioprocess = (event) => {
                    if (!voiceVadActive) return;
                    const inputData = event.inputBuffer.getChannelData(0);
                    // 计算 RMS（与桌面端一致）
                    let sum = 0;
                    for (let i = 0; i < inputData.length; i++) {
                        sum += inputData[i] * inputData[i];
                    }
                    const rms = Math.sqrt(sum / inputData.length) * 32768; // 缩放到 int16 范围
                    handleVAD(rms);
                };

                source.connect(voiceScriptNode);
                voiceScriptNode.connect(voiceAudioContext.destination);

                voiceState = 'listening';
                voiceVadActive = true;
                voiceSpeechStarted = false;
                voiceRecordStartTime = 0;
                updateVoiceButton();
                setStatus('👂 语音模式 · 请说话...');

            } catch (e) {
                dwarn('语音模式启动失败:', e);
                setStatus('无法访问麦克风: ' + e.message);
                exitVoiceMode();
            }
        }

        // 退出语音模式
        function exitVoiceMode() {
            voiceVadActive = false;
            voiceState = 'idle';
            voiceSpeechStarted = false;
            voiceSilenceStart = 0;
            voiceSpeechConfirmCount = 0;

            if (voiceRecorder && voiceRecorder.state !== 'inactive') {
                try { voiceRecorder.stop(); } catch(e) {}
            }

            if (voiceScriptNode) {
                try { voiceScriptNode.disconnect(); } catch(e) {}
                voiceScriptNode = null;
            }

            if (voiceMicStream) {
                voiceMicStream.getTracks().forEach(t => t.stop());
                voiceMicStream = null;
            }

            if (voiceAudioContext) {
                voiceAudioContext.close();
                voiceAudioContext = null;
            }

            // 停止播放
            if (window._currentAudio) {
                window._currentAudio.pause();
                window._currentAudio = null;
            }

            updateVoiceButton();
            setStatus('语音模式已退出');
            setTimeout(() => setStatus('准备就绪'), 1500);
        }

        // VAD 核心：由 ScriptProcessorNode.onaudioprocess 驱动（时域RMS，与桌面端一致）
        let voiceSilenceStart = 0;  // 静音开始时间戳
        let voiceSpeechConfirmCount = 0; // 连续超阈值帧计数（防噪声误触发）
        const SPEECH_CONFIRM_FRAMES = 2; // 需要连续 2 帧超阈值才确认语音开始
        const BARGE_IN_THRESHOLD = 700; // 打断阈值
        let voiceTtsStartTime = 0;      // TTS开始播放时间
        function handleVAD(rms) {
            if (!voiceVadActive) return;
            const now = Date.now();

            if (voiceState === 'listening') {
                // 监听中：连续多帧超阈值才确认语音开始，避免噪声误触发
                if (rms > VAD_RMS_THRESHOLD) {
                    voiceSpeechConfirmCount++;
                    if (voiceSpeechConfirmCount >= SPEECH_CONFIRM_FRAMES) {
                        dlog(`[VAD] 语音确认 RMS=${rms.toFixed(0)}，开始录音`);
                        voiceSpeechStarted = true;
                        voiceSpeechConfirmCount = 0;
                        voiceSilenceStart = 0;
                        startVoiceRecording();
                    }
                } else {
                    voiceSpeechConfirmCount = 0;
                }
            } else if (voiceState === 'recording') {
                const recordDuration = now - voiceRecordStartTime;

                // 安全阀：最长录音时间
                if (recordDuration > VAD_MAX_RECORD_MS) {
                    dlog('[VAD] 录音超时，自动停止');
                    stopVoiceRecording();
                    return;
                }

                if (rms > VAD_RMS_THRESHOLD) {
                    // 有声音，重置静音计时
                    voiceSilenceStart = 0;
                } else if (voiceSpeechStarted) {
                    // 静音中，且之前检测到过语音
                    if (!voiceSilenceStart) {
                        voiceSilenceStart = now;
                    }
                    const silenceDuration = now - voiceSilenceStart;
                    if (silenceDuration > VAD_SILENCE_MS && recordDuration > VAD_MIN_RECORD_MS) {
                        dlog(`[VAD] 静音 ${silenceDuration}ms，停止录音`);
                        stopVoiceRecording();
                    }
                }
            } else if (voiceState === 'speaking') {
                // 朗读中：检测用户说话进行打断
                const elapsed = now - voiceTtsStartTime;
                if (elapsed > 800 && rms > BARGE_IN_THRESHOLD) {
                    dlog(`[VAD] 打断检测 RMS=${rms.toFixed(0)}`);
                    interruptSpeaking();
                }
            }
            // processing 状态：不做任何事
        }

        // 开始录音（由 handleVAD 触发）
        function startVoiceRecording() {
            if (voiceState !== 'listening' || !voiceMicStream) return;

            try {
                audioChunks = [];
                voiceRecorder = new MediaRecorder(voiceMicStream, {
                    mimeType: selectedMimeType || 'audio/webm'
                });

                voiceRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                voiceRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        await processVoiceRecording();
                    } else {
                        if (voiceVadActive) {
                            voiceState = 'listening';
                            voiceSpeechStarted = false;
                            updateVoiceButton();
                            setStatus('👂 语音模式 · 请说话...');
                        }
                    }
                };

                voiceRecorder.start(250);
                voiceState = 'recording';
                voiceRecordStartTime = Date.now();
    
                updateVoiceButton();
                setStatus('🎙️ 正在听你说...');

            } catch (e) {
                dwarn('录音启动失败:', e);
                voiceState = 'listening';
                voiceSpeechStarted = false;
                updateVoiceButton();
            }
        }

        // 停止录音（由 handleVAD 触发）
        function stopVoiceRecording() {
            if (voiceState !== 'recording' || !voiceRecorder) return;

            try {
                voiceRecorder.stop();
                voiceState = 'processing';
                    voiceSpeechStarted = false;

                setStatus('🔄 正在识别...');
                updateVoiceButton();
            } catch (e) {
                dwarn('停止录音失败:', e);
                voiceState = 'listening';
                    voiceSpeechStarted = false;
                updateVoiceButton();
            }
        }

        // 处理录音结果 — 与 sendMessage 完全一致的逻辑，加上语音播报
        async function processVoiceRecording() {
            try {
                let audioBlob;
                try {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioBlob = await convertWebMToWAV(audioBlob);
                } catch (e) {
                    dwarn('音频转换失败，直接发送:', e);
                    audioBlob = new Blob(audioChunks, { type: audioChunks[0]?.type || 'audio/webm' });
                }

                dlog(`[语音] 录音数据: ${audioBlob.size} bytes, type: ${audioBlob.type}`);
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.wav');

                // 如果有待保存内容，传给后端处理确认/取消/合并
                if (pendingSaveText) {
                    formData.append('pending_save_text', pendingSaveText);
                }

                setStatus('🔄 正在识别和回复...');

                const response = await fetch('/api/voice_dialogue', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    dwarn('[voice_dialogue] 错误:', data.error);
                    addBubble('assistant', '哎呀，出了点小问题: ' + data.error);
                    resetToListening();
                    return;
                }

                // ASR 未识别到文字（retry=true）
                if (data.retry) {
                    if (data.text) addBubble('assistant', data.text);
                    resetToListening();
                    return;
                }

                // 显示用户说的话
                if (data.user_text) {
                    addBubble('user', data.user_text);

                    // 退出词检测
                    const exitWords = ['退出', '不用了', '结束', '拜拜', '再见', '停'];
                    if (exitWords.some(w => data.user_text.includes(w))) {
                        addBubble('assistant', '好的，有什么需要再叫我~');
                        exitVoiceMode();
                        return;
                    }
                }

                // --- 以下与 sendMessage 的响应处理完全一致 ---

                // 如果后端处理了待保存（saved=true），清除前端的 pending 状态
                if (data.saved && pendingSaveText) {
                    pendingSaveText = null;
                    showPendingIndicator(false);
                }

                // 新的待保存确认状态
                if (data.pending_save) {
                    pendingSaveText = data.pending_save;
                    showPendingIndicator(true);
                }

                // 显示助手回复
                if (data.text) {
                    addBubbleTypewriter('assistant', data.text);
                }

                // 搜索结果
                if (data.results && data.results.length > 0) {
                    showResults(data.results);
                }

                // 播放回复语音（服务端已同步返回 audio）
                if (data.audio) {
                    voiceState = 'speaking';
                    updateVoiceButton();
                    await playVoiceAudio(data.audio);
                } else {
                    resetToListening();
                }

            } catch (error) {
                dwarn('语音处理失败:', error);
                addBubble('assistant', '处理出了点问题，再试一次？');
                resetToListening();
            }
        }

        // 共享音频播放逻辑：base64 → blob → 播放 → 超时安全阀 → 回调
        async function playAudioFromBase64(audioB64, timeoutMs) {
            const audioBytes = Uint8Array.from(atob(audioB64), c => c.charCodeAt(0));
            const audioBlob = new Blob([audioBytes], { type: 'audio/mpeg' });

            if (window._currentAudio) {
                window._currentAudio.pause();
                window._currentAudio = null;
            }

            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            window._currentAudio = audio;

            const speakTimeout = setTimeout(() => {
                dwarn('[TTS] 朗读超时，自动继续');
                if (window._currentAudio === audio) {
                    audio.pause();
                    window._currentAudio = null;
                    URL.revokeObjectURL(audioUrl);
                }
                continueVoiceLoop();
            }, timeoutMs);

            audio.onended = () => {
                clearTimeout(speakTimeout);
                URL.revokeObjectURL(audioUrl);
                if (window._currentAudio === audio) window._currentAudio = null;
                continueVoiceLoop();
            };

            audio.onerror = () => {
                clearTimeout(speakTimeout);
                URL.revokeObjectURL(audioUrl);
                if (window._currentAudio === audio) window._currentAudio = null;
                continueVoiceLoop();
            };

            setStatus('🔊 正在朗读...');
            voiceTtsStartTime = Date.now();
            await audio.play();
        }

        // 播放 base64 编码的语音音频（从 voice_dialogue 返回）
        async function playVoiceAudio(audioB64) {
            try {
                await playAudioFromBase64(audioB64, 30000);
            } catch (e) {
                dwarn('语音播放失败:', e);
                continueVoiceLoop();
            }
        }

        // 将 WebM 转换为 WAV 格式（百度ASR需要WAV）
        async function convertWebMToWAV(webmBlob) {
            const arrayBuffer = await webmBlob.arrayBuffer();
            // 复用 voiceAudioContext（已设为 16kHz），避免每次新建
            const actx = voiceAudioContext || new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const audioBuffer = await actx.decodeAudioData(arrayBuffer);

            const targetSampleRate = 16000;
            // 如果解码后已经是 16kHz 则跳过重采样
            let finalBuffer = audioBuffer;
            if (audioBuffer.sampleRate !== targetSampleRate) {
                finalBuffer = resampleAudio(audioBuffer, targetSampleRate);
            }

            const wavData = audioBufferToWav(finalBuffer, targetSampleRate);
            return new Blob([wavData], { type: 'audio/wav' });
        }

        // 重采样音频
        function resampleAudio(audioBuffer, targetSampleRate) {
            const sourceSampleRate = audioBuffer.sampleRate;
            const sourceLength = audioBuffer.length;
            const targetLength = Math.round(sourceLength * targetSampleRate / sourceSampleRate);
            const sourceData = audioBuffer.getChannelData(0);

            // 创建新的缓冲区（模拟）
            const resampledData = new Float32Array(targetLength);

            // 简单线性插值重采样
            for (let i = 0; i < targetLength; i++) {
                const sourceIndex = i * sourceSampleRate / targetSampleRate;
                const index = Math.floor(sourceIndex);
                const fraction = sourceIndex - index;

                if (index + 1 < sourceLength) {
                    resampledData[i] = sourceData[index] * (1 - fraction) + sourceData[index + 1] * fraction;
                } else {
                    resampledData[i] = sourceData[index] || 0;
                }
            }

            return {
                length: targetLength,
                sampleRate: targetSampleRate,
                getChannelData: () => resampledData
            };
        }

        // 将 AudioBuffer 转换为 WAV 格式
        function audioBufferToWav(audioBuffer, sampleRate) {
            const numChannels = 1; // 单声道
            const format = 1; // PCM
            const bitDepth = 16;

            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            const numFrames = audioBuffer.length;
            const dataSize = numFrames * blockAlign;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            // 写入PCM数据
            const channelData = audioBuffer.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < numFrames; i++) {
                const sample = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }

            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        async function speakText(text) {
            try {
                let cleanText = text.replace(/\n/g, ' ')
                    .replace(/（[^）]+）/g, '')
                    .replace(/https?:\/\/\S+/g, '')
                    .replace(/\*\*/g, '')
                    .replace(/[#*`\-_]/g, '')
                    .trim();
                if (!cleanText) {
                    continueVoiceLoop();
                    return;
                }
                cleanText = cleanText.slice(0, 280);

                setStatus('🔊 正在合成语音...');

                const response = await fetch('/api/speech_synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: cleanText })
                });

                const data = await response.json();
                if (data.error) {
                    dwarn('语音合成失败:', data.error);
                    setStatus('语音合成失败，继续监听...');
                    continueVoiceLoop();
                    return;
                }

                await playAudioFromBase64(data.audio, (cleanText.length * 200) + 15000);

            } catch (e) {
                dwarn('语音播放失败:', e);
                continueVoiceLoop();
            }
        }

                const versionEl = document.getElementById('app-version');
                if (versionEl && versionData.version) {
                    versionEl.textContent = 'v' + versionData.version;
                }
            } catch (e) {
                document.getElementById('settings-fields').innerHTML = '<div style="color:var(--error,#ef4444);padding:20px;">加载失败: ' + e.message + '</div>';
            }
        }

        function renderSettingsFields(settings, meta) {
            const container = document.getElementById('settings-fields');
            let html = '';
            for (const [key, m] of Object.entries(meta)) {
                const val = settings[key] || '';
                const type = m.sensitive ? 'password' : 'text';
                const required = m.required ? ' <span style="color:#ef4444;">*</span>' : '';
                const help = m.help ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${m.help}</div>` : '';
                const placeholder = m.sensitive ? '输入新值（留空不修改）' : '';
                html += `
                    <div style="margin-bottom:18px;">
                        <label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">${m.label}${required}</label>
                        <input type="${type}" id="setting-${key}" value="${val.replace(/"/g,'&quot;')}" placeholder="${placeholder}"
                            style="width:100%;padding:10px 14px;border:1px solid var(--card-border);border-radius:12px;font-size:14px;background:rgba(255,255,255,0.6);color:var(--text-primary);outline:none;transition:border-color 0.2s;"
                            onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--card-border)'" />
                        ${help}
                    </div>`;
                // 管理员密码字段后添加"访问管理后台"按钮
                if (key === 'ADMIN_KEY') {
                    html += `
                    <div style="margin-bottom:18px;">
                        <button onclick="openAdminPanel()" style="width:100%;padding:10px 14px;border:1px solid var(--primary);border-radius:12px;font-size:13px;font-weight:600;color:var(--primary);background:transparent;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:6px;"
                            onmouseover="this.style.background='var(--primary-glow)'" onmouseout="this.style.background='transparent'">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                            访问管理后台
                        </button>
                    </div>`;
                }
            }
            container.innerHTML = html;
        }

        function openAdminPanel() {
            window.open('/admin', '_blank');
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function saveSettings() {
            const btn = document.getElementById('settings-save-btn');
            btn.textContent = '保存中...';
            btn.disabled = true;
            const data = {};
            if (_settingsMeta) {
                for (const key of Object.keys(_settingsMeta)) {
                    const el = document.getElementById('setting-' + key);
                    if (el) data[key] = el.value;
                }
            }
            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const result = await resp.json();
                if (result.success) {
                    showToast('✅ ' + result.message, 'success');
                    closeSettings();
                } else {
                    showToast('❌ ' + (result.error || '保存失败'), 'error');
                }
            } catch (e) {
                showToast('❌ 网络错误: ' + e.message, 'error');
            } finally {
                btn.textContent = '保存';
                btn.disabled = false;
            }
        }

        async function testLlmConnection() {
            const btn = document.getElementById('settings-test-btn');
            const resultDiv = document.getElementById('settings-test-result');
            btn.textContent = '测试中...';
            btn.disabled = true;
            resultDiv.style.display = 'block';
            resultDiv.style.background = 'rgba(255,193,7,0.1)';
            resultDiv.style.color = '#856404';
            resultDiv.textContent = '正在测试连接...';
            try {
                const resp = await fetch('/api/settings/test', { method: 'POST' });
                const data = await resp.json();
                if (data.ok) {
                    resultDiv.style.background = 'rgba(34,197,94,0.1)';
                    resultDiv.style.color = '#166534';
                    resultDiv.textContent = '✅ ' + data.message;
                } else {
                    resultDiv.style.background = 'rgba(239,68,68,0.1)';
                    resultDiv.style.color = '#991b1b';
                    resultDiv.textContent = '❌ ' + data.error;
                }
            } catch (e) {
                resultDiv.style.background = 'rgba(239,68,68,0.1)';
                resultDiv.style.color = '#991b1b';
                resultDiv.textContent = '❌ ' + e.message;
            } finally {
                btn.textContent = '测试连接';
                btn.disabled = false;
            }
        }

        // ═══ 检查更新 ═══
        let _updateInfo = null;

        async function checkForUpdate() {
            try {
                const resp = await fetch('/api/update/check');
                const data = await resp.json();
                if (data.has_update) {
                    _updateInfo = data;
                    setTimeout(() => showUpdateModal(data), 1500);
                }
            } catch (e) {}
        }

        async function checkForUpdateManual() {
            const btn = document.getElementById('settings-update-btn');
            if (!btn) return;
            const originalText = btn.innerHTML;
            btn.innerHTML = '检查中...';
            btn.disabled = true;
            try {
                const resp = await fetch('/api/update/check');
                const data = await resp.json();
                if (data.has_update) {
                    _updateInfo = data;
                    closeSettings();
                    setTimeout(() => showUpdateModal(data), 300);
                } else if (data.error) {
                    showToast('❌ 检查失败: ' + data.error, 'error');
                } else {
                    showToast('✅ 当前已是最新版本 v' + data.current_version, 'success');
                }
            } catch (e) {
                showToast('❌ 网络错误: ' + e.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showUpdateModal(data) {
            document.getElementById('update-version-info').textContent =
                `当前版本 v${data.current_version}  →  最新版本 ${data.latest_version}`;
            const changelog = document.getElementById('update-changelog');
            changelog.textContent = data.changelog || '暂无更新说明';
            document.getElementById('update-modal').style.display = 'block';
        }

        function closeUpdateModal() {
            document.getElementById('update-modal').style.display = 'none';
        }

        function downloadUpdate() {
            if (_updateInfo && _updateInfo.download_url) {
                window.open(_updateInfo.download_url, '_blank');
            }
            closeUpdateModal();
            showToast('已打开下载页面，下载完成后安装即可升级', 'info');
        }

        // 首次启动检测：如果未配置 API Key，自动弹出设置
        async function checkFirstTimeSetup() {
            try {
                const resp = await fetch('/api/settings');
                const data = await resp.json();
                if (!data.configured) {
                    setTimeout(() => {
                        showToast('👋 首次使用请先配置 API 密钥', 'info');
                        openSettings();
                    }, 800);
                }
            } catch (e) {}
        }

        // 点击遮罩关闭设置弹窗
        document.getElementById('settings-modal').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

        // 点击遮罩关闭升级弹窗
        document.getElementById('update-modal').addEventListener('click', function(e) {
            if (e.target === this) closeUpdateModal();
        });

        // 启动时检测配置
        checkFirstTimeSetup();
        // 启动 3 秒后检查更新（避免与首次设置冲突）
        setTimeout(checkForUpdate, 3000);
    </script>
</body>
</html>
